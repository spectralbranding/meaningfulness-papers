    description: "Phase 3.5b full per-locked-item classification matrix + Table 3 + Table 5 inter-judge"
  - path: "phase_3_5c_runs/prompts/RENDER_RU_gigachat.md"
    operator: "GigaChat"
    phase: "3.5c"
    language_out: "Russian"
  - path: "phase_3_5c_runs/prompts/RENDER_RU_yandexgpt.md"
    operator: "YandexGPT"
    phase: "3.5c"
    language_out: "Russian"
  - path: "phase_3_5c_runs/prompts/EXTRACT_FROM_RU_via_GPT4o.md"
    operator: "GPT-4o (extractor)"
    phase: "3.5c"
  - path: "phase_3_5d_runs/prompts/RENDER_ZH_deepseek.md"
