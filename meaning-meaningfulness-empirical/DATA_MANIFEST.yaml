    phase: "3.5d"
    language_out: "Simplified Chinese"
  - path: "phase_3_5d_runs/prompts/RENDER_ZH_claude_opus.md"
    operator: "Claude Opus"
    phase: "3.5d"
    language_out: "Simplified Chinese"
  - path: "phase_3_5d_runs/prompts/RENDER_ZH_qwen36_27b_ollama.md"
    operator: "Qwen3.6:27b@Ollama"
    phase: "3.5d"
    language_out: "Simplified Chinese"
    deployment_tier: "open-weights local (Q4_K_M quantization)"
  - path: "phase_3_5d_runs/prompts/EXTRACT_FROM_ZH_via_GPT4o.md"
    operator: "GPT-4o (primary extractor)"
    phase: "3.5d"
  - path: "phase_3_5d_runs/prompts/EXTRACT_FROM_ZH_via_qwen36_27b_ollama.md"
    operator: "Qwen3.6:27b@Ollama (cross-extractor robustness)"
