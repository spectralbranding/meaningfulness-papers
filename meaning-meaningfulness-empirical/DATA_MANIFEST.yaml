---
# DATA_MANIFEST.yaml
# Paper B 2026ap — Same Meaning, Different Prose
# Single-source listing of all public data artifacts for this paper.
# Mirrors the internal structure at the file level; internal-only artifacts
# (session handoffs, triage memos, review summaries, AI orchestration logs)
# are excluded per the transparency-docs-must-be-public discipline.

paper_key: "2026ap"
version: "1.1.0"
date: "2026-05-28"
zenodo_concept_doi: "10.5281/zenodo.20409701"
public_repo: "https://github.com/spectralbranding/meaningfulness-papers/tree/main/meaning-meaningfulness-empirical"

# ── Spine and substrate artifacts ─────────────────────────────────────────────

spine:
  - path: "SPINE.yaml"
    description: "Paper B structured substrate — propositions, evidence, external anchors, dependency graph"
    version: "v0.4.x (final at v1.1.0)"

source_paper_spines:
  - path: "VALIDATION_CASE_PB_FOCAL_EISENHARDT_MARTIN_SPINE.yaml"
    paper: "Eisenhardt and Martin (2000)"
    nodes: "7 propositions + 3 observations + 2 findings"
  - path: "VALIDATION_CASE_PB_FOCAL_ZOLLO_WINTER_SPINE.yaml"
    paper: "Zollo and Winter (2002)"
    nodes: "6 propositions + 2 observations + 2 findings"
  - path: "VALIDATION_CASE_PB_KBV_GRANT_SPINE.yaml"
    paper: "Grant (1996)"
    notes: "KBV pair; OCR'd PDF source"
  - path: "VALIDATION_CASE_PB_KBV_LIEBESKIND_SPINE.yaml"
    paper: "Liebeskind (1996)"
    notes: "KBV pair"
  - path: "VALIDATION_CASE_PB_SECONDARY_PRECURSOR_TUSHMAN_OREILLY_SPINE.yaml"
    paper: "Tushman and O'Reilly (1996)"
    notes: "Standalone precursor"

# ── Isomorphism and rendering artifacts ───────────────────────────────────────

isomorphism_analyses:
  - path: "TWIN_PAIR_ISOMORPHISM_PB_FOCAL.md"
    description: "Typed-DAG isomorphism analysis; Rec=4 with preserved antecedents L1-L4; extended §8 for third LinkedIn rendering"
  - path: "TWIN_PAIR_ISOMORPHISM_PB_KBV.md"
    description: "Typed-DAG isomorphism analysis; Rec=4 with preserved antecedents K1-K4"
  - path: "SELF_APPLICATION_ISOMORPHISM_PB.md"
    description: "Self-application Substack rendering isomorphism; 11/14 strict / 14/14 semantic / 0 contradicted"
  - path: "CROSS_PAPER_P4_ISOMORPHISM.md"
    description: "Cross-paper P4 demonstration isomorphism; 12/15 strict / 15/15 semantic within-operator"

renderings:
  - path: "RENDERING_PB_SUBSTACK_PRACTITIONER.md"
    task: "alpha"
    words: 1615
    operator: "Claude Opus 4.7"
    description: "Practitioner-register Substack rendering of Paper B's own substrate"
  - path: "RENDERING_PA_PRACTITIONER.md"
    task: "phase_2_5_cross_paper"
    words: 2102
    operator: "Claude Opus 4.7"
    description: "Cross-paper Substack rendering of Paper A's full theoretical apparatus"
  - path: "RENDERING_FOCAL_PAIR_THIRD_PROSE.md"
    task: "beta"
    words: 1044
    operator: "Claude Opus 4.7"
    description: "Third LinkedIn rendering of focal-pair shared substrate L1-L4"
  - path: "RENDERING_PB_ABSTRACT_RUSSIAN.md"
    task: "gamma_human_native"
    words: 212
    language: "Russian"
    operator: "Dmitry Zharnikov (human native)"
    description: "Human-native Russian rendering of Paper B §Abstract"
  - path: "RENDERING_PB_THEORY_RUSSIAN.md"
    task: "gamma_human_native"
    words: 734
    language: "Russian"
    operator: "Dmitry Zharnikov (human native)"
    description: "Human-native Russian rendering of Paper B §Theory §Positioning"

extraction_spines:
  - path: "VALIDATION_CASE_PB_SELF_APPLICATION_SPINE.yaml"
    description: "Within-operator extraction of Task alpha Substack rendering (Claude Opus baseline)"
  - path: "VALIDATION_CASE_PB_SELF_APPLICATION_GPT4_SPINE.yaml"
    description: "Cross-operator GPT-4o extraction of Task alpha Substack rendering"
  - path: "VALIDATION_CASE_PA_PRACTITIONER_SPINE.yaml"
    description: "Within-operator extraction of Phase 2.5 cross-paper rendering (Claude Opus baseline)"
  - path: "VALIDATION_CASE_PA_PRACTITIONER_GPT4_SPINE.yaml"
    description: "Cross-operator GPT-4o extraction of Phase 2.5 cross-paper rendering"
  - path: "VALIDATION_CASE_PB_FOCAL_THIRD_RENDERING_SPINE.yaml"
    description: "Within-operator extraction of Task beta LinkedIn third rendering"
  - path: "VALIDATION_CASE_PB_FOCAL_THIRD_GPT4_SPINE.yaml"
    description: "Cross-operator GPT-4o extraction of Task beta LinkedIn third rendering"

# ── Cross-language artifacts ───────────────────────────────────────────────────

cross_language_results:
