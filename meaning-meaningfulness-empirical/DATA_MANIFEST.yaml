    qwen_gpt4o_extractor: {rec: 12, strict: 8, semantic: 4, missing: 0, contradicted: 0}
    deepseek_qwen_extractor_robustness: {rec: 12, strict: 7, semantic: 5, missing: 0, contradicted: 0}

# ── Experimental cascade (L0-L4) ──────────────────────────────────────────────

experiment_cascade:
  l0_specification:
    - path: "experiment/L0_specification/CROSS_OPERATOR_DISCIPLINE.md"
      description: "B ≠ C HARD RULE with compliance table for all phases"
    - path: "experiment/L0_specification/OLLAMA_SERIAL_DISCIPLINE.md"
      description: "Qwen3.6:27b serial-only execution constraint (shared GPU hardware)"
    - path: "experiment/L0_specification/PRE_REGISTRATION_PHASE_3_5.md"
      description: "Retroactive pre-registration; EXPLORATORY status; all 4 phases"
  l1_models:
    - path: "experiment/L1_models/models.yaml"
      description: "SSOT for all 6 operators; versions, endpoints, API-key env-var references"
  l4_analysis:
    - path: "experiment/L4_analysis/cross_phase_summary.md"
      description: "Full hypothesis verdict table across all 12 cross-language renderings"
  validation:
    - path: "experiment/validation/session_record.schema.json"
      description: "JSON Schema draft-07 for JSONL log records"
    - path: "experiment/validation/validate.py"
      description: "Validate all JSONL logs against schema; exit 0 on pass"

# ── HuggingFace dataset ────────────────────────────────────────────────────────

huggingface_dataset:
  repo: "spectralbranding/meaningfulness-cross-language-rendering"
  doi: "10.57967/hf/8971"
  splits:
    phase_3_5b: {rows: 36, description: "Phase 3.5b cross-FAMILY Russian renderings"}
    phase_3_5c: {rows: 24, description: "Phase 3.5c Russian-native LLM retry"}
    phase_3_5d: {rows: 48, description: "Phase 3.5d Chinese-language renderings + cross-extractor"}
    combined: {rows: 108, description: "All cross-language phases combined"}
  build_script: "experiment/hf_dataset/prepare_dataset.py"
  readme: "experiment/hf_dataset/README.md"

# ── Protocol documents ─────────────────────────────────────────────────────────

protocols:
  - path: "PHASE3_5A_RUSSIAN_RENDERING_PROTOCOL.md"
    description: "Russian human-native rendering protocol (codebook + source-text + falsifier spec)"
  - path: "PHASE3_5B_MULTI_LLM_OPERATOR_PROTOCOL.md"
    description: "Multi-LLM cross-FAMILY operator-robustness protocol"
  - path: "PHASE4_KAPPA_MEASUREMENT_2026-05-27.md"
    description: "Inter-coder kappa measurement protocol (pre-registered for v1.2.0)"
  - path: "PHASE1_ANCHOR_VERIFICATION_2026-05-27.md"
    description: "Pre-draft bibliographic anchor verification (Crossref cascade)"

# ── Companion computation code ────────────────────────────────────────────────

code:
  - path: "code/rec_metric.py"
    run: "uv run python code/rec_metric.py --spine1 <yaml1> --spine2 <yaml2>"
    description: "Computes Rec(G1, G2) — maximum common subgraph with typed-DAG constraints"
  - path: "code/null_baseline.py"
    run: "uv run python code/null_baseline.py --n-shadows 1000 --seed 42"
    description: "Random-graph null baseline; 1,000 size-matched shadows; seed 42"
  - path: "code/cost_function_calibration.py"
    run: "uv run python code/cost_function_calibration.py --spines <paths> --renderings <paths>"
    description: "Grid-anchored beta/delta cost-function exponent calibration"
  - path: "code/multi_llm_rendering.py"
    description: "Multi-LLM rendering harness (Phase 3.5b/c/d execution)"
  - path: "code/cross_operator_extraction.py"
    description: "Cross-operator extraction pipeline (Operator C extractor; prose-only input)"
  - path: "code/llm_call_logger.py"
    description: "Single-source JSONL logger schema; redaction at write time"
  - path: "code/README.md"
    description: "Code directory overview + run commands + reproducibility notes"

# ── LLM-call provenance logs ──────────────────────────────────────────────────

logs:
  directory: "logs/"
  description: "9 JSONL files; one per experimental phase; schema in experiment/validation/session_record.schema.json"
  redaction: "API keys and credentials redacted at write time via llm_call_logger.py"
  files:
    - "phase_1_crossref_anchor_verification_calls.jsonl"
    - "phase_2_render_PB_spine_to_substack_practitioner_calls.jsonl"
    - "phase_2_extract_spine_from_substack_rendering_calls.jsonl"
    - "phase_2_prime_extract_spine_from_substack_rendering_PB_via_GPT4_calls.jsonl"
    - "phase_2.5_render_PA_spine_to_substack_practitioner_calls.jsonl"
    - "phase_2.5_extract_spine_from_PA_practitioner_rendering_calls.jsonl"
    - "phase_2.5_prime_extract_spine_from_PA_practitioner_rendering_via_GPT4_calls.jsonl"
    - "phase_3_render_focal_pair_shared_substrate_to_linkedin_calls.jsonl"
    - "phase_3_prime_extract_spine_from_focal_pair_third_rendering_via_GPT4_calls.jsonl"
---
