    relationship: "inherited_unchanged"
    note: "All four boundary conditions C1 (version-controlled authoring), C2 (propositional claims), C3 (audience-schema divergence), C4 (artifact volume) hold for the four twin-pair source papers and for Paper B itself. Verified per source in Phase 2 extractions."
  pair_specific_conditions:
    - id: PB_BC1
      statement: "Both twin-pair source papers are produced as separate prose renderings of a substrate the operator can extract retroactively. Bikard-protocol independence is helpful for distinguishing rendering-equivalence from textual copying but not required for paper_a:P4 demonstration under the v1.2.0 P4 reframe — P4 asks whether two prose renderings share a substrate, not whether the authors were unaware of each other's drafts."
      observable: "Two independently-published source papers; each paper's spine extractable per paper_a:appendix_B_protocol; antecedent edges traceable from each spine to a shared antecedent literature; pair-specific isomorphism analysis produces Rec ≥ 3 with preserved antecedents under axiom A1."
      excludes: "Pairs where one paper is a strict extension or republication of the other (rendering of identical substrate by same author); pairs without extractable propositional structure (fails paper_a:C2)."
      provenance:
        created_by: "author"
        created_at: "2026-05-26"
        source_log_event: "PHASE_0_THESIS v1.0.0 §4 (revised v0.3.0 P4 reframe 2026-05-27 — Bikard-protocol-independence demoted from required to helpful-but-not-required)"

