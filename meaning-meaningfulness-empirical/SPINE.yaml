# SPINE.yaml — Paper B 2026ap Empirical Companion (Cost-Asymmetry Twin-Discovery Study)
#
# This is Paper B's structured spine v0.1.0 under schema v0.2 per
# [internal path removed] Paper B cites Paper A 2026ao
# spine v0.7.3 as theoretical_predecessor and adds empirical-extension nodes
# (observations / methods / measurements / findings) for the v1.0.0 N=2
# twin-pair cohort. Where Paper B's prose makes a claim that rests on a
# Paper-A spine entry, the reference is namespaced as paper_a:<id> (e.g.,
# paper_a:P4, paper_a:axiom_A1, paper_a:C1). Reviewers evaluate the two
# spines together but never duplicate; each node is owned by exactly one
# spine.

spine_version: "0.2"              # schema version (per Paper A; observations/methods/measurements/findings/derivations first-class)
spine_doc_version: "0.5.3"
paper_key: "2026ap"               # placeholder; verify CANONICAL_REFERENCES.md at joint Zenodo upload (post-Session-E)
paper_a_companion_key: "2026ao"   # theoretical-foundation paper
theoretical_predecessor:
  paper_key: "2026ao"
  spine_doc_version: "0.7.3"
  spine_path: "[internal path removed] (in worktree [internal path removed])"
  concept_doi: "[DOI reserved at joint Zenodo upload]"
  inheritance_mode: "namespaced_reference"
  inherited_elements:
    - "Operator role + era-dependent projection table (paper_a:operator_role)"
    - "Three-level hierarchy L → S → R (paper_a:Theory.three_layer_decomposition)"
    - "Typed-DAG specification with 10 node types and 17 edge types (paper_a:appendix_A_schema)"
    - "Cost-function functional forms c_AI(S) = α·|V|^β; c_human(R) = γ·|tokens|^δ (paper_a:cost_asymmetry)"
    - "Recombination metric Rec(G1, G2) definition (paper_a:recombination_operator)"
    - "Boundary conditions C1–C4 (paper_a:C1, paper_a:C2, paper_a:C3, paper_a:C4)"
    - "Negative scope conditions NSC1–NSC5 (paper_a:NSC1..NSC5)"
    - "Primary propositions P1 separability + P4 rendering-equivalence under axiom A1 (paper_a:P1, paper_a:P4, paper_a:axiom_A1)"
    - "Theoretically-derived predictions P2 recombination + P3 verification-cost asymmetry (paper_a:P2, paper_a:P3)"
    - "Preservation theorem under strict K-as-typed-DAG reading (paper_a:preservation_theorem)"
    - "Spine-first drafting protocol (paper_a:appendix_B_protocol)"
status: "Phase 0.5 — locked under schema v0.2 (Paper B v1.0.0 P4-reframed empirical companion; central contribution is empirical demonstration of paper_a:P4 rendering-equivalence under spine-preservation; β/δ calibration demoted to supportive evidence for paper_a:P3 ordering)"
target_venue_primary: "Strategic Management Journal"
target_venue_secondary: "Organization Science"
target_venue_tertiary: "Journal of Management Studies"

title: >-
  Same Meaning, Different Prose: Spine Preservation and Rendering Equivalence in Organizational Knowledge Work

thesis: |
  Paper A 2026ao states P4 (rendering-equivalence under spine-preservation)
  as a primary preservation theorem: two prose renderings of a locked
  substrate converge on conclusions if and only if both renderings preserve
  the spine's structural elements, under axiom A1 (σ-faithfulness on locked
  subsets). Paper B is the empirical companion. Its v1.0.0 central
  contribution is an empirical demonstration of paper_a:P4 on management-
  theory twin pairs: two independently-extracted source papers produced as
  separate prose renderings share a substrate at Rec = 4 linked propositions
  with preserved antecedents on BOTH available pairs (focal: Eisenhardt-Martin
  2000 + Zollo-Winter 2002; KBV: Grant 1996 + Liebeskind 1996). Each twin
  pair is treated as one example of two prose renderings that share an
  underlying substrate — not as a Bikard test of recombination-rate (P2)
  nor as a calibration of cost-asymmetry-driven recombination thresholds
  (P3). v1.0.0 secondary contributions are: grid-anchored illustrative
  estimates of β and δ across five available spines and renderings,
  reported as supportive of the paper_a:P3 ordering β < 1 < δ; and a
  pre-registered iterative-cohort-growth protocol with Zenodo-DOI-per-
  version discipline that turns the working-paper trajectory itself into
  a longitudinal self-test of paper_a:P4 (each Paper B release is a
  rendering of a growing substrate). v1.0.0 task set adds self-application
  to Paper B's own spine, third-rendering of the focal-pair shared
  substrate, cross-language re-rendering, and inter-coder κ measurement
  on axiom A1.

