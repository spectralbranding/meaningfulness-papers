    source_measurements: ["PB_m_beta_per_spine", "PB_m_delta_per_rendering"]
    generating_method: "PB_M3"
    statistical_strength: "N=5 spines and N=5 renderings; supportive evidence of ordering at small N, no statistical power claim"
    conditions: ["paper_a:C1", "paper_a:C2", "paper_a:C3", "paper_a:C4"]
    antecedents: ["PB_O1", "PB_O2", "PB_O3", "PB_O5", "PB_O6", "PB_M1", "PB_M3"]
