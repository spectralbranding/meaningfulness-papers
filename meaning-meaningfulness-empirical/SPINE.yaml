findings:
  - id: PB_F1
    statement: "[POPULATED at v1.1.0; REFRAMED at v0.3.0 / v1.0.0] Both twin pairs demonstrate paper_a:P4 (rendering-equivalence under spine-preservation) empirically: each pair consists of two independently-authored prose renderings whose retroactively-extracted spines share Rec = 4 linked propositions with preserved antecedents. Rec(G_EM, G_ZW) = 4 (focal pair, dynamic-capabilities sub-domain; EM 2000 + ZW 2002 are two prose renderings sharing a substrate). Rec(G_Grant, G_Liebeskind) = 4 (KBV pair, knowledge-based-view sub-domain; Grant 1996 + Liebeskind 1996 are two prose renderings sharing a substrate). Cross-pair convergence at Rec = 4 across two distinct theoretical sub-domains is the central empirical finding under the P4 reframe: substrate-sharing is observable at the typed-DAG isomorphism level in management theory, extending Paper A's Heisenberg-Schrödinger Appendix D historical existence proof into the contemporary management-research artifact base."
    type: "P4_demonstration_at_small_N"
    source_measurements: ["PB_m_rec_focal", "PB_m_rec_kbv"]
    generating_method: "PB_M2"
    statistical_strength: "N=2 twin pairs (=4 prose renderings) in distinct theoretical sub-domains; P4 demonstration at small N, not falsification"
    conditions: ["paper_a:C1", "paper_a:C2", "paper_a:C3", "paper_a:C4", "PB_BC1", "paper_a:axiom_A1"]
    antecedents: ["PB_O1", "PB_O2", "PB_O5", "PB_O6", "PB_M1", "PB_M2"]
    falsifier_at_v1_2_0: "Either pair's Rec falls below 3 with preserved antecedents, or axiom_A1 inter-coder reliability falls below κ = .75 on either spine when measured at Task δ — in which case P4 degrades to probabilistic tendency on the affected subdomain per paper_a:P4 falsifier specification."
    citation_role_in_paper: "primary_evidence_for_paper_a:P4_at_small_N"
    related_paper_a_proposition: "paper_a:P4"
    provenance:
      created_by: "author + tool:rec_metric.py"
      created_at: "2026-05-27"
    body_sections: ["Results — Rec metric estimates as P4 demonstration", "Discussion — P4 evidence and boundary on substrate-sharing claims at small N"]

  - id: PB_F2
    statement: "[POPULATED at v1.1.0; DEMOTED at v0.3.0 / v1.0.0 from primary to supportive] The five β estimates and five δ estimates jointly satisfy β < 1 < δ across all observations. Under v1.0.0 P4 reframe, this is supportive evidence for the paper_a:P3 ordering — NOT Paper B's central contribution. The β/δ ordering supports the inference that the cost-asymmetry mechanism Paper A's apparatus predicts is consistent with the management-theory artifacts Paper B's P4 demonstration uses; but Paper B does not claim to test P3 at the recombination-rate scale paper_a:P3's organizational-outcome statement specifies, and the Rec*(β) β-conditional threshold (retained as Discussion footnote) is a P3-conditional cross-tie rather than a primary Paper B contribution."
