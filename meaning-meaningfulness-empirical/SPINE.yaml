methods:
  - id: PB_M1
    statement: "Retroactive spine extraction per Paper A Online Appendix B applied in reverse to each available source paper at v1.1.0."
    type: "qualitative_coding"
    inputs: ["PB_O1", "PB_O2", "PB_O3", "PB_O5", "PB_O6"]
    outputs: ["VALIDATION_CASE_PB_FOCAL_EISENHARDT_MARTIN_SPINE.yaml", "VALIDATION_CASE_PB_FOCAL_ZOLLO_WINTER_SPINE.yaml", "VALIDATION_CASE_PB_SECONDARY_PRECURSOR_TUSHMAN_OREILLY_SPINE.yaml", "VALIDATION_CASE_PB_KBV_GRANT_SPINE.yaml", "VALIDATION_CASE_PB_KBV_LIEBESKIND_SPINE.yaml"]
    code_anchor: "code/extract_citation_contexts.py + manual proposition coding (single-coder at v1.0.0)"
    reproducibility:
      seed: "single-coder by author at v1.0.0; inter-coder κ on 20% subsample for reliability deferred to v1.1.0"
      version: "TBD at [session] Phase 2"
    related_paper_a_method: "paper_a:M2 (retroactive spine extraction)"
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Method — twin-pair extraction"]

  - id: PB_M2
    statement: "Rec(G1, G2) metric computation as the size of the maximum common subgraph preserving node typing and antecedent edges per paper_a:recombination_operator. Under the v1.0.0 P4 reframe, Rec(G1, G2) measures structural-substrate preservation across two prose renderings — the central operationalization of paper_a:P4 at the artifact level. A Rec ≥ 3 value on a twin pair is direct evidence that the two prose renderings share an underlying substrate (P4 demonstration), independent of whether the authors knew each other's drafts (which is Bikard-protocol independence — relevant for P2 organizational recombination-rate work but NOT essential for P4 substrate-sharing claims)."
    type: "graph_algorithm"
    inputs: ["five extracted spines from PB_M1 at v1.1.0 (EM + ZW + TO + Grant + Liebeskind)"]
    outputs: ["Rec(G_EM, G_ZW) focal pair = 4 (paper_a:P4 evidence)", "Rec(G_Grant, G_Liebeskind) KBV pair = 4 (paper_a:P4 evidence)"]
    note: "Two pairs computed at v1.1.0 with cross-pair convergence at Rec = 4. Under v1.0.0 P4 reframe: both Rec=4 values are direct paper_a:P4 demonstrations on management-theory twin pairs, extending Paper A's Appendix D Heisenberg-Schrödinger historical existence proof from quantum mechanics into management theory. TO1996 spine alone is not a pair input (standalone precursor; substrate-sharing partner deferred — under reframe, what TO1996 needs is any second rendering of its substrate, not necessarily a Bikard-independent partner)."
    code_anchor: "code/rec_metric.py (skeleton at Phase 0; full implementation at Phase 3)"
    reproducibility:
      seed: "deterministic (no RNG; maximum-common-subgraph via standard graph-isomorphism routine)"
      version: "TBD at Phase 3"
    provenance:
      created_by: "author + tool:rec_metric.py"
      created_at: "2026-05-26"
    body_sections: ["Results — Rec metric estimates"]

  - id: PB_M3
    statement: "Cost-function exponent calibration: β fit from substrate-graph traversal cost as function of |V| across five spines; δ fit from rendering verification cost as function of token count across five source-paper renderings. Under v1.0.0 P4 reframe, this is a SECONDARY contribution providing supportive evidence for the paper_a:P3 ordering (β < 1 < δ) — NOT Paper B's central contribution. The β/δ apparatus is retained because the joint ordering across five observations is a small supporting piece of evidence that the cost-asymmetry mechanism Paper A predicts holds in the management-theory artifacts Paper B's P4 demonstration uses; but the paper's central argument no longer rests on this calibration."
    type: "regression_calibration"
    inputs: ["five extracted spines from PB_M1 at v1.1.0", "five source-paper renderings from PB_O1..PB_O3 + PB_O5..PB_O6", "operator coding-time logs"]
    outputs: ["β point estimate per spine (5 values at v1.1.0)", "δ point estimate per rendering (5 values at v1.1.0)", "parameter-grid locations against paper_a:appendix_C_simulation grid"]
    code_anchor: "code/cost_function_calibration.py"
    reproducibility:
      seed: "42 (fixed; per paper_a default)"
      version: "[session] Phase 3 + v1.1.0 KBV-pair FORK"
    note: "v1.1.0 reports point estimates without confidence intervals; statistical-power claims are out of scope. v1.0.0 reframe demotes β/δ from primary to secondary contribution per feedback_paper_b_p4_reframe.md."
    provenance:
      created_by: "author + tool:cost_function_calibration.py"
      created_at: "2026-05-26"
    body_sections: ["Results — cost-function exponent calibration"]

  - id: PB_M4
    statement: "Iterative-cohort-growth protocol: v1.0.0 → v4.0.0 versioning trajectory with Zenodo-DOI-per-version discipline; methodological additions per release."
    type: "research_protocol"
    inputs: ["v1.0.0 release procedure", "subsequent-version specifications"]
    outputs: ["RELEASE_NOTES_v1.0.0.md ([session])", "trajectory documentation in paper.md Discussion"]
    related_paper_a_method: "self-application of paper_a:appendix_B_protocol at multi-version scale"
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Method — iterative-cohort-growth protocol", "Discussion — Versioning trajectory"]

