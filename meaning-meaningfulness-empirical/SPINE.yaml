target_venue_primary: "Strategic Management Journal"
target_venue_secondary: "Organization Science"
target_venue_tertiary: "Journal of Management Studies"

title: >-
  Same Meaning, Different Prose: Spine Preservation and Rendering Equivalence in Organizational Knowledge Work

thesis: |
  Paper A 2026ao states P4 (rendering-equivalence under spine-preservation)
  as a primary preservation theorem: two prose renderings of a locked
  substrate converge on conclusions if and only if both renderings preserve
  the spine's structural elements, under axiom A1 (σ-faithfulness on locked
  subsets). Paper B is the empirical companion. Its v1.2.0 central
  contribution is an empirical demonstration of paper_a:P4 on management-
  theory twin pairs: two independently-extracted source papers produced as
  separate prose renderings share a substrate at Rec = 4 linked propositions
  with preserved antecedents on BOTH available pairs (focal: Eisenhardt-Martin
  2000 + Zollo-Winter 2002; KBV: Grant 1996 + Liebeskind 1996). Each twin
  pair is treated as one example of two prose renderings that share an
  underlying substrate — not as a Bikard test of recombination-rate (P2)
  nor as a calibration of cost-asymmetry-driven recombination thresholds
  (P3). v1.2.0 secondary contributions are: grid-anchored illustrative
  estimates of β and δ across five available spines and renderings,
  reported as supportive of the paper_a:P3 ordering β < 1 < δ; and a
  pre-registered iterative-cohort-growth protocol with Zenodo-DOI-per-
  version discipline that turns the working-paper trajectory itself into
  a longitudinal self-test of paper_a:P4 (each Paper B release is a
  rendering of a growing substrate). v1.2.0 task set adds self-application
  to Paper B's own spine, third-rendering of the focal-pair shared
  substrate, cross-language re-rendering, and inter-coder κ measurement
  on axiom A1.

