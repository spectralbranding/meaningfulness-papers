paper_thesis: |
  Dynamic capabilities are specific and identifiable organizational processes
  (product development, strategic decision making, alliancing) that explain how
  firms reconfigure resources in dynamic markets. Contrary to the prevailing
  RBV-derived view, DCs are not vague or tautological; they have significant
  commonalities across firms, making them more homogeneous, fungible, equifinal,
  and substitutable than the resource-based-view tradition assumed. DC form
  shifts by market dynamism: routine-like in moderately dynamic markets,
  simple-and-experiential in high-velocity markets.

# ============================================================================
# Propositions (the paper's central claims, locked at this spine extraction)
# ============================================================================
propositions:
  - id: EM_P1
    statement: "Dynamic capabilities are a set of specific and identifiable organizational processes (e.g., product development, strategic decision making, alliancing)."
    falsifier: "DCs that produce competitive advantage cannot be operationalized as identifiable processes."
    body_location: "abstract; §Dynamic Capabilities Defined"
    antecedents: []

  - id: EM_P2
    statement: "Dynamic capabilities are neither vague nor tautological."
    falsifier: "Empirical attempts to specify DCs yield circular definitions."
    body_location: "abstract; introduction"
    antecedents: ["RBV-critique-literature (Priem-Butler 2000; Williamson 1999)"]

  - id: EM_P3
    statement: "Dynamic capabilities are idiosyncratic in their details and path-dependent in their emergence, but have significant commonalities across firms (best practices)."
    falsifier: "Cross-firm DC comparisons show no measurable commonalities; idiosyncrasy dominates."
    body_location: "abstract; §Commonalities"
    antecedents: ["EM_P1"]

  - id: EM_P4
    statement: "Dynamic capabilities are more homogeneous, fungible, equifinal, and substitutable than is usually assumed by RBV scholars."
    falsifier: "DCs prove uniformly heterogeneous, non-fungible, and non-substitutable across firms."
    body_location: "abstract; §Implications"
    antecedents: ["EM_P3", "Teece-Pisano-Shuen 1997"]

  - id: EM_P5
    statement: "In moderately dynamic markets, dynamic capabilities resemble the traditional conception of routines: detailed, analytic, stable processes with predictable outcomes."
    falsifier: "DCs in moderately dynamic markets exhibit unpredictability and instability."
    body_location: "§Moderate vs High Velocity"
    antecedents: ["EM_P1", "Nelson-Winter 1982 routines"]

  - id: EM_P6
    statement: "In high-velocity markets, dynamic capabilities are simple, highly experiential, and fragile processes with unpredictable outcomes."
    falsifier: "DCs in high-velocity markets are detailed and predictable."
    body_location: "§Moderate vs High Velocity"
    antecedents: ["EM_P1", "Brown-Eisenhardt 1997 simple rules"]

  - id: EM_P7
    statement: "Well-known learning mechanisms (practice, codification, articulation, error rate, pacing of experience) guide the evolution of dynamic capabilities."
    falsifier: "DC evolution is independent of the canonical learning-mechanism literature."
    body_location: "§Evolution of Dynamic Capabilities"
    antecedents: ["Argote 1999 organizational learning curve", "Levitt-March 1988"]

