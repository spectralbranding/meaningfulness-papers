# ============================================================================
observations:
  - id: T_O1
    statement: "Eisenhardt-Martin 2000 SMJ and Zollo-Winter 2002 Org Sci are widely-cited dynamic-capabilities papers with markedly different vocabularies, journals, first authors, evidence bases, and theoretical lineages."
    raw_data_pointer: "LinkedIn post opening lines"
    maps_to_focal_substrate: ["TWIN_PAIR_ISOMORPHISM_PB_FOCAL §1 Bikard-protocol independence preamble"]
    map_quality: "preserved (named-papers + difference-recognition)"

# ============================================================================
# Findings / propositions about the shared substrate
# ============================================================================
findings:
  - id: T_L1
    statement: "Dynamic capabilities are specific identifiable processes built on routines, not vague organizational mystique. Eisenhardt-Martin frame as 'strategic and organizational processes — like product development, alliancing, and strategic decision-making' with cross-firm commonalities. Zollo-Winter frame as 'routinized activities directed at the development and adaptation of operating routines.' Different vocabulary; same underlying claim: DCs sit above operating routines and are nameable."
    type: "shared_substrate_proposition"
    node_typing: "proposition"
    antecedent_edge:
      type: "refines"
      antecedent: "Nelson and Winter (1982) evolutionary theory of routines"
      preserved: true
    maps_to_focal_substrate: ["L1"]
    map_quality: "PRESERVED — node type (proposition) matches; antecedent (Nelson-Winter 1982 routines) preserved with edge type 'refines' (LinkedIn rendering: 'built on routines' = refines edge)"

  - id: T_L2
    statement: "Learning mechanisms drive how dynamic capabilities form and evolve. Eisenhardt-Martin name 'practice, codification of experience, mistakes, and pacing of experience.' Zollo-Winter operationalize into three mechanisms: experience accumulation, knowledge articulation, knowledge codification. Different granularity; same underlying claim: DCs do not emerge spontaneously; learning produces them."
    type: "shared_substrate_proposition"
    node_typing: "proposition"
    antecedent_edge:
      type: "refines"
      antecedent: "Levitt and March (1988) organizational learning"
      preserved: true
    maps_to_focal_substrate: ["L2"]
    map_quality: "PRESERVED — node type matches; antecedent (Levitt-March 1988) explicitly named; edge type 'refines' (LinkedIn rendering: 'operationalize into three mechanisms' = refines from EM catalog to ZW partition)"

  - id: T_L3
    statement: "There are cross-firm commonalities in dynamic capabilities at the best-practice or mechanism level, even where firm-specific detail diverges. Eisenhardt-Martin: 'best practices that lead to common-form configurations.' Zollo-Winter: 'a mix of learning behaviors firms use across contexts.' Different framings; same claim: DCs are not pure firm idiosyncrasy. Structural patterns generalize."
    type: "shared_substrate_proposition"
    node_typing: "proposition"
    antecedent_edge:
      type: "bridges"
      antecedent: "Teece, Pisano, and Shuen (1997) SMJ dynamic-capabilities framework"
      preserved: true
    maps_to_focal_substrate: ["L3"]
    map_quality: "PRESERVED — node type matches; antecedent (Teece-Pisano-Shuen 1997) named with full author list; edge type 'bridges' preserved (LinkedIn rendering: 'common-form configurations' / 'mix of learning behaviors' both bridge to TPS-1997 framework)"

  - id: T_L4
    statement: "Dynamic-capability form is contingent on market or task features. Eisenhardt-Martin distinguish moderately dynamic markets from high-velocity markets; Zollo-Winter distinguish task frequency, task homogeneity, causal ambiguity. Different contingency variables; same claim: DC form is not market-or-task-invariant. Boundary conditions matter."
    type: "shared_substrate_proposition"
    node_typing: "proposition"
    antecedent_edge:
      type: "extends"
      antecedent: "Eisenhardt and Tabrizi (1995) ASQ adaptive processes"
      preserved: true
    maps_to_focal_substrate: ["L4"]
    map_quality: "PRESERVED — node type matches; antecedent (Eisenhardt-Tabrizi 1995 ASQ) explicitly named; edge type 'extends' preserved (LinkedIn rendering: 'predict different DC forms... mechanism-effectiveness across task features' extends ET-1995 environment-contingent-adaptation logic)"

