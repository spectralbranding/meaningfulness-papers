paper_thesis: |
  Dynamic capabilities are routinized activities directed at developing and
  adapting operating routines. They are shaped by the co-evolution of three
  learning mechanisms: (1) semi-automatic experience accumulation, (2)
  deliberate knowledge articulation, and (3) deliberate knowledge codification.
  Relative effectiveness of these mechanisms is contingent on task features
  (frequency, homogeneity, causal ambiguity). Counterintuitively, highly
  deliberate learning processes (codification) have superior effectiveness at
  lower task frequency, higher heterogeneity, and higher causal ambiguity.

# ============================================================================
# Propositions
# ============================================================================
propositions:
  - id: ZW_P1
    statement: "Dynamic capabilities are routinized activities directed to the development and adaptation of operating routines."
    falsifier: "DCs can be empirically separated from any routinized substrate; one-off activities qualify as DCs."
    body_location: "abstract; §Definition"
    antecedents: ["Nelson-Winter 1982 routines"]

  - id: ZW_P2
    statement: "Three learning mechanisms — semi-automatic experience accumulation, deliberate knowledge articulation, deliberate knowledge codification — jointly shape DC evolution."
    falsifier: "DC evolution observable in the absence of any of the three mechanisms; or a fourth mechanism dominates."
    body_location: "abstract; §Learning Mechanisms"
    antecedents: ["Levitt-March 1988 organizational learning", "Nonaka 1994 tacit/explicit"]

  - id: ZW_P3
    statement: "Firms adopt a mix of learning behaviors constituted by semi-automatic experience accumulation + deliberate investments in articulation + codification."
    falsifier: "Firms specialize in only one mechanism and still achieve DC evolution."
    body_location: "§Learning Mix"
    antecedents: ["ZW_P2"]

  - id: ZW_P4
    statement: "Relative effectiveness of the capability-building mechanisms is contingent on task features: frequency, homogeneity, causal ambiguity."
    falsifier: "Mechanism effectiveness is uniform across task types."
    body_location: "§Contingencies; §Hypotheses"
    antecedents: ["ZW_P2", "ZW_P3"]

  - id: ZW_P5
    statement: "Highly deliberate learning processes (codification) have superior effectiveness at lower task frequency, higher heterogeneity, and higher causal ambiguity (counterintuitive result)."
    falsifier: "Codification effectiveness is highest at high frequency / low heterogeneity / low causal ambiguity (the conventional intuition)."
    body_location: "§Hypotheses; §Discussion"
    antecedents: ["ZW_P4"]

  - id: ZW_P6
    statement: "DCs themselves require investment; they do not emerge automatically from operating-routine variance."
    falsifier: "Firms achieve DC evolution without deliberate articulation or codification investment."
    body_location: "§Cost of DCs"
    antecedents: ["ZW_P2", "ZW_P3"]

