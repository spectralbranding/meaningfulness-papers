# ============================================================================
# Findings
# ============================================================================
findings:
  - id: G_F1
    statement: "The knowledge-based view of the firm is consistent with transaction-cost theory but emphasizes a different role: firms as institutions for managing team production (knowledge integration) rather than as institutions for managing transactions."
    type: "theoretical_synthesis_finding"
    source_propositions: [G_P3, G_P4, G_P5]
    body_location: "The Existence of the Firm"

  - id: G_F2
    statement: "Interdependence within tasks is endogenous to organizational design (not exogenously driven by production technology); the knowledge-based view supports managerial choice over interdependence patterns."
    type: "theoretical_implication"
    source_propositions: [G_P5, G_P6]
    body_location: "Coordination Within the Firm"

