# Findings
# ============================================================================
findings:
  - id: L_F1
    statement: "Firms' institutional knowledge-protection capabilities are a distinct source of sustained competitive advantage beyond the legal-property-rights regime; this is a knowledge-based addition to the strategic theory of the firm."
    type: "theoretical_synthesis_finding"
    source_propositions: [L_P1, L_P3, L_P4, L_P6]
    body_location: "Conclusion"

  - id: L_F2
    statement: "Internalization of knowledge production (vs market contracting) is the dominant firm strategy where legal protection is weak and institutional protection costs are lower than market-contracting protection costs; firm boundaries are partly determined by this calculus."
    type: "boundary_finding"
    source_propositions: [L_P3, L_P4]
    body_location: "Conclusion; Implications for firm boundaries"

