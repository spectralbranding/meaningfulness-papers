paper_thesis: |
  Successful organizations face an enduring pattern in which prior success
  precedes failure during technology discontinuities. To remain successful
  across long periods, organizations must be ambidextrous — able to implement
  both incremental (evolutionary) and revolutionary (discontinuous) change.
  Ambidexterity requires maintaining multiple structures, processes, and
  cultures within the same firm, integrated by a senior leadership team.

# ============================================================================
# Propositions (v1.1.0 partner extraction will check antecedent preservation)
# ============================================================================
propositions:
  - id: TO_P1
    statement: "Across industries, prior success often precedes failure: leading firms in one technology era typically do not lead the next."
    falsifier: "Cross-industry leadership-turnover analysis shows incumbent advantage dominates across technology eras."
    body_location: "§Patterns in Organization Evolution"
    antecedents: ["industry-evolution literature; Schumpeter creative destruction; Foster 1986 Innovation"]

  - id: TO_P2
    statement: "To remain successful over long periods, organizations must be ambidextrous — capable of implementing both incremental and revolutionary change."
    falsifier: "Long-run-successful organizations rely on either incremental OR revolutionary change exclusively without ambidexterity."
    body_location: "abstract; §Patterns; §Ambidextrous Organizations"
    antecedents: ["March 1991 exploration/exploitation"]

  - id: TO_P3
    statement: "Established organizations struggle with revolutionary change because of internal inertia (structural, cultural, political); the same factors that drive incremental success obstruct discontinuous response."
    falsifier: "Successful incumbents transition through technology discontinuities at rates comparable to new entrants."
    body_location: "§Cycles of Technology and Organizational Change"
    antecedents: ["Hannan-Freeman 1984 structural inertia"]

  - id: TO_P4
    statement: "Ambidextrous organizations use multiple structures, processes, and cultures within the same firm to handle exploration and exploitation in parallel."
    falsifier: "Successful ambidextrous outcomes occur without internal-structural duality."
    body_location: "§Ambidextrous Organizations"
    antecedents: ["Lawrence-Lorsch 1967 differentiation/integration", "Galbraith 1973"]

  - id: TO_P5
    statement: "Senior leadership team integration is the central managerial mechanism enabling ambidexterity — the team must hold tensions between exploration and exploitation explicitly."
    falsifier: "Ambidextrous outcomes achieved without senior-team integration of the tension."
    body_location: "§Managing Ambidextrous Organizations"
    antecedents: ["TO_P3", "TO_P4"]

  - id: TO_P6
    statement: "Organizational culture is the primary lever for maintaining ambidexterity — explicit cultural management is required to prevent the dominant culture from suppressing the minority innovation effort."
    falsifier: "Ambidextrous orgs maintain structural duality without cultural-management investment."
    body_location: "§Cultural Levers"
    antecedents: ["TO_P4", "O'Reilly 1989 corporations culture commitment"]

