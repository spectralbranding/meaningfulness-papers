    source_measurements: ["RPB_m_pair_focal", "RPB_m_pair_kbv"]
    generating_method: "RPB_M1"
    statistical_strength: "two pairs across distinct theoretical sub-domains; practitioner-rendered as 'across two different theoretical sub-domains, the same pattern: substantial structural overlap underneath very different prose'"
