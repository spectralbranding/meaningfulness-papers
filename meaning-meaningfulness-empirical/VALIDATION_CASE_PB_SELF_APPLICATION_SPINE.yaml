    source_measurements: []
    generating_method: "general framework specification"
    statistical_strength: "framework-derived; practitioner-rendered as cost-ratio claim"
    maps_to_source_spine: ["PB_F2"]
    map_quality: "preserved (β<1<δ ordering translated to 'sub-linear AI cost / super-linear human cost' without invoking the exponents; secondary-supportive role preserved by being placed AFTER P4 in the article structure)"

  - id: RPB_F4
    statement: "The Substack article itself is a worked instance of the framework: same substrate as the working paper, different rendering, same conclusions expected — and the reader who walks away with a different bottom line from the academic version vs the Substack version is themselves the falsification test."
