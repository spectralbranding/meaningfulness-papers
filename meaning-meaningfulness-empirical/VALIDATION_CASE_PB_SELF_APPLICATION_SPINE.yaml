    source_measurements: []
    generating_method: "explicit self-reference in article §test-you-can-run-on-the-article"
    maps_to_source_spine: ["PB_F4"]
    map_quality: "preserved + EXTENDED — Substack rendering adds an explicit invitation for reader to act as second-coder via comment-section falsifier; source-spine PB_F4 is at the version-trajectory scale, rendering adds a per-reader scale"

