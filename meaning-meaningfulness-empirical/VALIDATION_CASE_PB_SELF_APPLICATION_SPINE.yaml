# Substack practitioner-register rendering of Paper B v1.0.0's substrate).
# This is the Task α self-application output: the same operator (author)
# acting as a fresh coder reading the Substack rendering as if it were a
# source paper, applying paper_a:appendix_B_protocol in reverse, and
# extracting the structural substrate the article encodes.
#
# Comparison against SPINE.yaml v0.3.1 (the source spine) is in
# SELF_APPLICATION_ISOMORPHISM_PB.md.
#
# Schema: paper_a:appendix_A_schema (10 node types, 17 edge types).
# Node-ID prefix: RPB_ (Rendering of Paper B) to distinguish from the
# source PB_ nodes the academic paper exposes.

spine_version: "0.2"
