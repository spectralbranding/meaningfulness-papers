    maps_to_source_spine: ["PB_F1"]
    map_quality: "preserved (central P4 claim; framework-jargon translated to 'substrate' and 'rendering'; substrate-sharing-as-evidence-for-P4 framing preserved)"

  - id: RPB_F2
    statement: "AI cost on substrate operations scales sub-linearly with substrate size; human cost on rendering verification scales super-linearly with rendering length; the joint ordering creates a measurable economic asymmetry organizations can exploit by routing AI to substrate and reserving human judgment for rendering."
