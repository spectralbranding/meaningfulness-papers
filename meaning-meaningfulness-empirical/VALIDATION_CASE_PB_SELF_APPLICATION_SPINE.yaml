# ============================================================================
# Methods
# ============================================================================
methods:
  - id: RPB_M1
    statement: "Retroactively reconstruct the structural substrate of each paper as the typed graph of claims, observations, methods, findings, and dependency edges; measure shared substrate between members of each pair."
