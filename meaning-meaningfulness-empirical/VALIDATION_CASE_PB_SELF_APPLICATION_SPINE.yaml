extraction_session: "Session H Phase 2 — Task α self-application"
extraction_date: "2026-05-27"
target_for_isomorphism: "SPINE.yaml v0.3.1 (source spine of Paper B v1.0.0)"

# ============================================================================
# Observations (raw material the rendering invokes)
# ============================================================================
observations:
  - id: RPB_O1
    statement: "Eisenhardt-Martin 2000 and Zollo-Winter 2002 are widely-read dynamic-capabilities papers that use markedly different vocabularies (best-practices-converging-to-common-forms vs deliberate-learning-mechanisms) and reach broadly convergent conclusions."
    raw_data_pointer: "Substack article opening paragraph"
    maps_to_source_spine: ["PB_O1", "PB_O2"]
    map_quality: "preserved (named-case anecdote vs academic citation; same observation underneath)"

  - id: RPB_O2
    statement: "Grant 1996 and Liebeskind 1996 are both in the SMJ knowledge-based-view special issue with different framings (integration of dispersed knowledge vs protection of knowledge from imitation) reaching similar conclusions about why firms exist."
    raw_data_pointer: "Substack article paragraph 2"
    maps_to_source_spine: ["PB_O5", "PB_O6"]
    map_quality: "preserved (same observation; venue + special-issue context retained)"

  - id: RPB_O3
    statement: "GitLab and Stripe maintain structured, version-controlled, publicly-published handbooks where policy changes propagate to all rendered communications."
    raw_data_pointer: "Substack article §named-patterns paragraph"
    maps_to_source_spine: []
