    inputs: ["RPB_O1", "RPB_O2"]
    outputs: ["measurement of shared substrate per pair"]
    maps_to_source_spine: ["PB_M1", "PB_M2"]
    map_quality: "preserved (Rec-metric language compressed to 'shared substrate measurement' for practitioner register; mathematical formalism dropped but operation identical)"

  - id: RPB_M2
    statement: "Run two renderings of the same substrate at the same time and have a reader check whether they reach the same bottom-line conclusion; instrument AI cost on substrate operations vs human cost on rendering verification."
    type: "operational_protocol"
    inputs: ["organizational knowledge artifacts"]
    outputs: ["cost ratio AI-substrate vs human-rendering", "conclusion-equivalence check across renderings"]
    maps_to_source_spine: ["PB_M3", "PB_M4"]
    map_quality: "preserved (β/δ calibration translated to 'cost ratio'; iterative-cohort-growth protocol translated to operational Monday-morning instrumentation; functional forms dropped but ordering claim preserved)"

