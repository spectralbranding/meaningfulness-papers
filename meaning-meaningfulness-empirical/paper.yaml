  abstract: 'This paper empirically demonstrates Zharnikov''s [-@zharnikov-2026ao-spec-based-research-post-ai]
    Proposition P4 — rendering-equivalence under spine-preservation — in management theory. The paper
    extends the companion theory''s Heisenberg–Schrödinger historical existence proof into contemporary
    strategy research via structural extractions of two independently-authored pairs: a dynamic-capabilities
    pair [@eisenhardt-2000-dynamic-capabilities-what; @zollo-winter-2002-deliberate-learning] and a knowledge-based-view
    pair from the *Strategic Management Journal* (SMJ) Winter 1996 Special Issue [@grant-1996-toward-knowledgebased-theory;
    @liebeskind-1996-knowledge-strategy]. The recombination metric Rec returns 4 linked propositions with
    preserved antecedents on each pair. A random-graph null baseline shows $\Pr(\mathrm{Rec} \ge 3 \text{
    by chance}) \approx .000$ across 1,000 size-matched shadows. Three additional renderings of substrates
    already in the corpus — a practitioner-register rendering of the paper''s own structure, a third rendering
    of the focal-pair shared substrate, and a cross-paper rendering of the companion theory''s full theoretical
    apparatus — preserve 11/14, 4/4, and 12/15 items strictly under within-operator extraction; 14/14,
    4/4, and 15/15 semantically; zero contradictions. Under the methodologically stronger cross-operator
    extraction (renderer and extractor in different model families), strict preservation is 9/14 and 10/15
    on the two formal-apparatus renderings (4/4 on the focal-pair rendering) with 14/14, 4/4, and 14/15
    semantically and still zero contradictions. A bibliographic-hallucination audit of twelve AI-suggested
    anchors finds two verified and ten negative findings. Secondary β/δ estimates satisfy the cost-asymmetry
    ordering. Cross-language demonstrations span Russian renderings across multiple LLMs (including Russian-native
    GigaChat Rec = 12 and YandexGPT Rec = 11) and Chinese renderings across five LLMs from three training-corpus
    families including an open-weights model running locally on a single Mac mini (DeepSeek Rec = 12,
    Claude Opus Rec = 11, Qwen3.6:27b Rec = 12), with cross-extractor robustness (DeepSeek''s Chinese
    rendering re-extracted by Qwen3.6 instead of GPT-4o: Rec = 12). Inter-coder reliability tests are
    pre-registered for a future release. The paper engages recombinant-search and knowledge-representation
    scholarship as theoretical antecedents.'
methodology:
  type: empirical
  design: 'Retroactive spine extraction per Paper A Online Appendix B applied in reverse to each available
    source paper at v1.1.0. Rec(G1, G2) metric computation as the size of the maximum common subgraph
    preserving node typing and antecedent edges per paper_a:recombination_operator. Under the v1.0.0 P4
    reframe, Rec(G1, G2) measures structural-substrate preservation across two prose renderings — the
    central operationalization of paper_a:P4 at the artifact level. A Rec ≥ 3 value on a twin pair is
    direct evidence that the two prose renderings share an underlying substrate (P4 demonstration), independent
    of whether the authors knew each other''s drafts (which is Bikard-protocol independence — relevant
    for P2 organizational recombination-rate work but NOT essential for P4 substrate-sharing claims).
    Cost-function exponent calibration: β fit from substrate-graph traversal cost as function of |V| across
    five spines; δ fit from rendering verification cost as function of token count across five source-paper
    renderings. Under v1.0.0 P4 reframe, this is a SECONDARY contribution providing supportive evidence
    for the paper_a:P3 ordering (β < 1 < δ) — NOT Paper B''s central contribution. The β/δ apparatus is
    retained because the joint ordering across five observations is a small supporting piece of evidence
    that the cost-asymmetry mechanism Paper A predicts holds in the management-theory artifacts Paper
    B''s P4 demonstration uses; but the paper''s central argument no longer rests on this calibration.'
