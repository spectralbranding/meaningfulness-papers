# ============================================================================
propositions:
  - id: P1
    statement: >-
      Meaning and meaningfulness are separately optimizable: σ takes L → S
      without consulting any R; ρ takes (S, cohort, language, medium) → R
      without altering S.
    type: ontological
    conditions: "C1, C2"
    antecedents: []
    assumptions: []
    falsifier: >-
      If σ requires inspecting any R(S, c, ℓ, m) to produce S, the middle
      layer is a projection from rendering rather than from log, and the
      hierarchy collapses to two-level.
    evidence:
      - type: self_application
        anchor: "This paper's own SPINE.yaml v0.3.0: reader can reproduce central claims from spine without reading paper.md prose."
      - type: analytic
        anchor: "Direct derivation from σ and ρ operator definitions in §5 of paper."
      - type: log_anchor
        anchor: "[internal path removed] (this file) + future paper.md when drafted"
    ruled_out_rivals: []
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 2 — Theory", "Section 5 — The Three-Level Hierarchy", "Section 6.1 — Validation Case A self-application"]

  - id: P2
    statement: >-
      Organizations (research labs, consulting firms, standards bodies)
      that publish the semantic substrate (S) of their knowledge artifacts
      as a first-class artifact achieve higher rates of knowledge
      recombination than organizations that publish only the rendering
      (R), under boundary conditions C1–C4. v0.5.0 organizational-outcome
      reframing per the review NF-grain gap: "Labs that publish spines exhibit
      higher citation-weighted derivative work (extension, contradiction,
      or refinement of locked propositions) within 24–36 months than
      matched labs that publish renderings only."
    type: management_outcome
    status_v0_6_0: "theoretically-derived prediction; empirical estimation deferred to Paper B 2026ap (per PIVOT-SPLIT; the review NR2 resolution)"
    primary_in: "Paper B 2026ap (empirical companion; iteratively-versioned working paper)"
    illustrative_in: "Paper A 2026ao (theory paper; T1' and T3 supply illustrative evidence; full estimation in Paper B)"
    conditions: "C1, C2, C3, C4"
    antecedents: [P1]
    assumptions: []
    falsifier: >-
      Under C1–C4, an organization that publishes only R achieves
      recombination rates indistinguishable from a matched organization
      that publishes S over a 24–36 month observation window. Empirical
      test in Paper B v2.0.0+ once prospective lab-cohort data is
      available; v1.0.0 illustration only.
    measurement: >-
      Recombination = rate at which new artifacts reuse ≥3 linked
      propositions from a prior artifact's locked spine with preserved
      antecedent-DAG structure (the review §1.2 specification, v0.5.0).
      Operational proxy: graph-alignment algorithms on public SPINE.yaml
      repositories (e.g., spectralbranding/* mirrors) measure subgraph
      reuse. Falsification within 24-36 months once N≥40 public spines
      exist. Calibrated simulation in §11 parameterizes the recombination
      operator Rec(G1, G2) = size of maximum common subgraph preserving
      types and antecedents (the review §6 specification).
    evidence:
      - type: code_anchor
        anchor: "<public-mirror>/<paper-slug>/code/recombination_simulation.py"
      - type: citation
        citation_keys: [cover-2006-elements-information-theory]
        citation_role: methodological_source
      - type: citation
        citation_keys: [kulkarni-2024-future-of-research-in-ai-driven-world]
        citation_role: theoretical_predecessor
        anchor: "AI-driven research future-state framing"
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 2 — Theory", "Section 5 — The Three-Level Hierarchy", "Section 8 — Discussion"]

  - id: P3
    statement: >-
      Under conditions C1–C4, generative-AI verification cost on S scales
      sub-linearly with claim volume while verification cost on R scales
      super-linearly. Knowledge-work organizations that allocate AI to
      S-layer verification and reserve human attention for R-layer
      sensemaking realize lower total verification cost than organizations
      that allocate AI uniformly across the artifact.
    formal_cost_functions: |
      v0.5.0 per the review §1.4 NF2 (mechanism formalization). Spine S is a
      typed directed acyclic graph G = (V, E, τ) where τ is the schema v0.2
      node-type taxonomy (10 first-class node types). Cost functions:
        c_AI(S) = α · |V|^β,  β < 1  (sub-linear in node count)
        c_human(R) = γ · |tokens|^δ,  δ > 1  (super-linear in token count)
      The σ operator succeeds if the extracted DAG passes isomorphism and
      coverage tests against a human gold-standard subgraph. The asymmetry
      β < 1 < δ is what makes the cost-allocation prescription dominate.
      Calibrated simulation in §11 varies β ∈ {.5, .7, .9} against δ ∈
      {1.1, 1.3, 1.5} and plots recombination rate as a function of (β, δ).
    type: management_outcome
    status_v0_6_0: "theoretically-derived prediction with formal cost-function specification; empirical β/δ estimation deferred to Paper B 2026ap (per PIVOT-SPLIT; the review NR2 resolution)"
    primary_in: "Paper B 2026ap (empirical companion; β/δ estimation across growing twin-pair cohort)"
    illustrative_in: "Paper A 2026ao (theory paper; calibrated simulation in §11 illustrates the cost-function shape; empirical estimation in Paper B)"
    conditions: "C1, C2, C3, C4"
    antecedents: [P1, P2]
    assumptions: [AA1]
    falsifier: >-
      Under C1–C4, AI verification cost on R scales at or below the rate
      on S (empirically β ≥ δ) — which would invert the cost-allocation
      prescription. Paper B v1.0.0 supplies illustrative β/δ point
      estimates from N=2 twin-pair extractions; v2.0.0+ supplies
      confidence intervals; v4.0.0 supplies SMJ-scale falsification
      test.
    evidence:
      - type: log_anchor
        anchor: "SF1 (F1+F2): cascade verification catches AI fabrication at S-layer; same fabrication would be invisible to reader-reviewer at R layer."
      - type: citation
        citation_keys: [kocak-levinthal-puranam-2023-dual-challenge-search-coordination]
        citation_role: theoretical_predecessor
        anchor: "Search-and-coordination duality maps onto verification-cost-allocation problem."
      - type: citation
        citation_keys: [kulkarni-2024-future-of-research-in-ai-driven-world]
        citation_role: motivating_problem
    ruled_out_rivals: [A1]
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 2 — Theory", "Section 5 — The Three-Level Hierarchy", "Section 8 — Discussion"]

  - id: P4
    statement: >-
      For any artifact whose SPINE.yaml is locked (propositions +
      dependencies + evidence-anchors + boundary conditions all explicit),
      two prose renderings of the same spine arrive at the same set of
      conclusions iff both preserve the spine's structural elements.
      Renderings may differ on every surface dimension (language, audience
      register, structural ordering, tone, formatting, length, medium) and
      still converge on conclusions. When two renderings DISAGREE on any
      locked proposition, boundary condition, stylized fact, antecedent
      DAG edge, recommended intervention, or scope claim, at least one
      has broken the spine.
