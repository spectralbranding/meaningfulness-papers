# ============================================================================
# Stylized facts (closes Grok F2) — aggregated patterns over findings;
# competing two-level frameworks cannot distinguish them.
# ============================================================================
stylized_facts:
  - id: SF1
    statement: >-
      Generative-AI literature-review tools hallucinate citations at rates
      above chance when given access only to rendered prose, not to
      verified claim graphs.
    aggregates_findings: [F1]      # v0.4.0: F2 removed from public aggregation per editorial direction
    aggregation_logic: >-
      F1 from this corpus (an aggregate-level observation that operator
      lit-review workflows produce fabrication rates above chance under
      R-only-access conditions) supplemented by NF1 (literature gap)
      and by generic-literature evidence on RAG-hallucination rates in
      scientific summarization ([session] Phase-2 DR identifies specific
      published benchmarks).
    indirect_evidence:
      - "Published hallucination-rate studies on RAG in scientific summarization (Phase-2 DR [session] will identify specific papers; current NF1)"
      - "Generic-literature primacy: SF1 in the public paper rests on these published studies, not on self-referential audit evidence (audit-internal F2 retained but not body-cited per v0.4.0 editorial direction)"
    uniquely_explained_by: >-
      Three-level hierarchy: AI operating on R alone reconstructs a
      plausible-sounding S from rendering-shaped tokens because S is not
      exposed. Two-level frames cannot distinguish this failure mode from
      generic AI error.
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 4.1 — Stylized Fact 1"]

  - id: SF2
    statement: >-
      A sub-class of replication failures in management research are
      rendering-layer divergences (operationalization, scale anchors, time
      windows) over a preserved underlying claim graph, not graph-layer
      disagreements.
    aggregates_findings: ["TBD Phase-2 DR [session] identifies specific OSC-2015 / Many-Labs / Camerer cases"]
    direct_evidence:
      - "Open Science Collaboration 2015 replication project"
      - "Many Labs studies"
      - "Camerer et al. economic-experiment replications"
    uniquely_explained_by: >-
      Three-level hierarchy locates failure at R layer; prescribes
      intervention (publish S; let replicators inspect the graph the
      rendering instantiated).
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 4.2 — Stylized Fact 2"]

  - id: SF3
    statement: >-
      Cross-language research collaboration preserves meaning (claim graph
      translates cleanly) while losing meaningfulness (register,
      citation-density expectations, narrative arc cues do not).
    aggregates_findings: ["TBD: structured measurement of register-divergence in Russian Telegram channel material"]
    direct_evidence:
      - "Mathematical Reviews translation workflow"
      - "Bulletin of the AMS Russian translation series"
      - "Multi-language clinical-trial registry summary practice"
      - "Spectral Branding Russian Telegram channel (memory: reference_telegram_channel) — same S, distinct R"
    uniquely_explained_by: >-
      Three-level hierarchy: ρ is cohort-conditional and reconstructed per
      language; σ produces a language-invariant S.
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 4.3 — Stylized Fact 3"]

  - id: SF4
    statement: >-
      Properly-specified scholarly artifacts exhibit conclusion-invariance
      across rendering medium (written prose, spoken podcast, slide deck,
      infographic, video). Neither pure philosophy of meaning, nor
      translation studies (sentence-equivalence focus), nor AI-generated-
      text research (typically single-medium) can explain this invariance.
      The three-level hierarchy explains it directly: medium is a
      rendering-layer parameter; spine is medium-invariant.
    aggregates_findings: ["TBD: structural comparison of T1 Heisenberg-Schrödinger twin pair (different formalisms, same conclusions)", "TBD: comparison protocol on this paper's own 5 companion renderings"]
    uniquely_explained_by: >-
      Three-level hierarchy: medium is a rendering-layer parameter; the
      spine is medium-invariant. P4 formalizes the invariance and supplies
      the falsifier (when two renderings disagree on conclusions, at least
      one broke the spine).
    provenance:
      created_by: "author (via IDEA_P4 doc 2026-05-26)"
      created_at: "2026-05-26"
    body_sections: ["Section 4.4 — Stylized Fact 4 (NEW)"]

# ============================================================================
# Alternative explanations (rivals ruled out)
# ============================================================================
alternative_explanations:
  - id: A1
    statement: "AI fabrication of citations is due to outdated training data, not the architectural distinction between S-access and R-only access."
    rules_out_required: [F1, F2]
    ruled_out_by: [F2]
    rules_out_status: "rejected"
    reasoning: >-
      F2's fabrications include synthesized 2024-2025 DOIs and venue
      references temporally posterior to Grok-4.1's training cutoff;
      the model is not "remembering" outdated data, it is generating
      novel plausible-sounding references at inference time. This is
      the architectural failure mode the framework predicts.
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 4.1 — Stylized Fact 1 (rivals)"]

  - id: A2
    statement: >-
      Rendering-equivalence under spine-preservation (P4) is just
      translation studies under a new name; sentence-equivalence
      between renderings is the actual claim.
    rules_out_required: [F3, "T1 isomorphism analysis (forthcoming)"]
    ruled_out_by: ["pending T1 + Distinction-from-translation-studies argument in [internal doc] §"]
    rules_out_status: "candidate (will be rejected at Phase 3 via formal distinction)"
    reasoning: >-
      Translation studies operates rendering→rendering (sentence ↔
      sentence equivalence). P4 operates spine→rendering
      (multi-realization from common substrate). Different mechanism,
      stronger invariance. T1's twin pair (Heisenberg matrix formalism
      vs Schrödinger PDE formalism) is the existence-proof: the two
      renderings could not possibly be sentence-by-sentence translations
      of one another (mathematical formalisms have no common sentences),
      yet they preserve conclusions.
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 5 — Three-Level Hierarchy (rivals)"]

# ============================================================================
# Assumption atoms — assumed-without-test premises (relaxable)
# ============================================================================
assumption_atoms:
  - id: AA1
    statement: "Crossref + Semantic Scholar + OpenAlex are authoritative for journal-published citations in 2020-2026 with <5% false-negative rate."
    type: "data_source_trust"
    relaxable: true
    relaxation_consequence: >-
      If the cascade is unreliable (>5% false negatives), M1 produces
      measurements with unknown error rate; F1 and F2 confidence
      degrade; SF1's quantitative force weakens to qualitative.
    affects: [M1, F1, F2, SF1]
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 4.1 — Method assumptions (footnote)"]

  - id: AA2
    statement: "Spine extraction from prose papers (Method M2) can be done with inter-coder agreement κ ≥ 0.7 for proposition identification."
    type: "method_validity"
    relaxable: true
    relaxation_consequence: >-
      If coder agreement is low (κ < 0.5), the extracted spines for T1
      and T2 reflect coder idiosyncrasy more than the source artifact;
      the isomorphism claim weakens to author-specific reconstruction.
    affects: [M2, "T1", "T2"]
    provenance:
      created_by: "author"
      created_at: "2026-05-26"
    body_sections: ["Section 7 — Method (validation cases)"]

# ============================================================================
# Negative findings — discoveries of absence
# ============================================================================
negative_findings:
  - id: NF1
    statement: >-
      No published benchmark currently reports per-claim DOI-level
      verification fabrication rates for AI literature-review tools at
      scale ≥ 100 papers; existing RAG-hallucination studies measure
      retrieval precision or qualitative-rating-of-output, not the
      hard verification rate that the cost-asymmetry framework
      requires for empirical anchoring.
    expected_observation: "A benchmark with per-citation DOI-verification at scale ≥ 100 papers across multiple AI lit-review tools."
    source_method: "Phase-2 DR literature search (Crossref + SemScholar + Google Scholar; [session] agent a59fe34fb8eecb54e secondary scan)"
    affects_nodes: [F1, F2, SF1]
    motivates: [SF1]
    provenance:
