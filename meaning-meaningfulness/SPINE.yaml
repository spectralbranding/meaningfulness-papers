    spine_nodes: [T1, P4]
    body_sections: ["Section 7.1 — Validation Case T1 (within-author rendering-equivalence demonstration; appendix-depth supporting evidence)"]
    note: >-
      Pauli 1927 "Zur Quantenmechanik des magnetischen Elektrons" (Delphenich
      English: "On the quantum mechanics of magnetic electrons"). User-
      supplied PDF v0.7.1 (2026-05-26). Pauli explicitly derives the
      Schrödinger wave-mechanics form of the magnetic-electron problem AND
      states the derivation produces results "completely equivalent in
      their consequences to the matrix equations of Heisenberg and Jordan"
      (abstract; verbatim Delphenich translation). This is a *within-
      author rendering-equivalence demonstration*: same operator (Pauli)
      explicitly performs both renderings (matrix-mechanics treatment of
      spin in Heisenberg-Jordan + Schrödinger wave-mechanics method in
      Pauli 1927) and explicitly notes their equivalence. Stronger P4
      evidence than the cross-author H-S equivalence because it removes
      possible coordination/cross-influence concerns: a single author
      doing both renderings within one paper cannot have coordinated
      with himself or been influenced by external bias. Auxiliary T1
      supporting evidence; appendix-depth at Paper A Phase 3 drafting
      ("Online Appendix D — Historical Existence Proof (Non-Management
      Domain)"). Per PIVOT-SPLIT discipline (H-S preserved as historical
      existence proof for P4; main body weight at Eisenhardt-Martin + Zollo-
      Winter management twin pair), Pauli 1927 strengthens the historical-
      record evidence without expanding main-body weight Grok r5 asked
      to reduce.

