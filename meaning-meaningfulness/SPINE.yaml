# SPINE.yaml — Layered Knowledge Artifacts Under Generative AI
#
# First paper drafted under the spine-first drafting protocol per CLAUDE.md
# item 0aa + research/SPINE_FIRST_DRAFTING_PROTOCOL.md.
#
# This file is the canonical structured representation of the paper's
# meaning. Prose in paper.md (when drafted at Phase 3) MUST trace every
# claim to a node here. FORK / REBASE / MERGE operations append rows in
# `changelog` below.
#
# Schema v0.2 (extended): observations, methods, measurements, findings,
# derivations, alternative_explanations, robustness_checks, limitations,
# negative_findings, assumption_atoms — all first-class. Provenance on every
# node. The schema is intentionally machine-operable; humans review and edit
# selectively, not author top-to-bottom. That is itself a structural claim
# of this paper (the schema's complexity is the cost-asymmetry result
# operationalized — see thesis below).

spine_version: "0.2"              # schema version (extended; see SPINE_FIRST_DRAFTING_PROTOCOL.md §"Schema v0.2")
spine_doc_version: "0.7.3"        # document revision (v0.1.0 → v0.2.0 → v0.3.0 → v0.4.0 → v0.5.0 → v0.6.0 PIVOT-SPLIT → v0.7.0 r4 closure → v0.7.1 user-supplied NF2/NF3-partial-resolution anchors → v0.7.2 post-draft Grok review FORK + 7 verified anchors + NF4-NF10 → v0.7.3 post-draft Grok r2 FORK + 8 verified anchors + NF11-NF14)
paper_key: "2026ao"               # placeholder; verify CANONICAL_REFERENCES.md at Phase 5; Paper A only post-PIVOT-SPLIT
paper_b_companion_key: "2026ap"   # empirical companion; scoping at research/meaning_meaningfulness_paper/PAPER_B_2026ap_SCOPING.md
status: "Phase 0.5 + Phase 4 FORK x2 — locked under schema v0.2 (Paper A theory-only post-PIVOT-SPLIT; v0.7.3 FORK pass after post-draft Grok review r2 adds 8 verified external_anchors plus records NF11-NF14; cumulative SF1 hallucination rate across r1-r5 + post1 + post2 ≈ 17 catches / ~53%)"
target_venue_primary: "Organization Science"
target_venue_secondary: "Journal of Management Inquiry"
target_venue_tertiary: "AI & Society"

title: >-
  Spec-Based Research in the Post-AI Era: A Cost-Asymmetry Theory of
  Meaning and Meaningfulness in Organizational Knowledge Work

thesis: |
  Generative AI shifts the cost-structure of knowledge work asymmetrically
  across the three-level hierarchy of scholarly artifacts (log → semantic
  graph → rendering). Meaning (the graph-extractable structure of claims,
  dependencies, and evidence) becomes cheap to verify and recombine at
  scale; meaningfulness (the context-dependent prose realization for a
  specific cohort) does not, and may become more costly relative to the new
  equilibrium. This asymmetry creates a management-theoretic cost-allocation
  problem. The three-level hierarchy is the analytical tool; the spine-first
  drafting protocol is the prescriptive intervention; the SPINE.yaml v0.2
  schema is the operational artifact — and its intentional complexity is
  the first operationalization of the cost-asymmetry result: a schema that
  is unwieldy for a human to author top-to-bottom is exactly what the
  cost-asymmetry predicts, because the spine is the meaning-operations layer
  where AI's comparative advantage is largest. The paper exhibits the
  post-AI knowledge-work organizational form by building it. The PRIMARY
  CONTRIBUTION (v0.6.0 PIVOT-SPLIT scoping) is the Operator role +
  era-dependent projection of structural-versus-judgment operations;
  the cost-asymmetry mechanism, the typed-DAG specification, the
  three-level hierarchy, the SPINE.yaml v0.2 schema, and the spine-first
  drafting protocol are operationalizations of the role-theoretic move,
  subordinated to online appendix structure (per Grok r3 NR1).
  Primary propositions locked v0.6.0: P1 (separability) + P4 (rendering-
  equivalence under spine-preservation). P2 (recombination) and P3
  (verification-cost asymmetry) are stated as theoretically-derived
  predictions with explicit falsifier specifications; empirical
  estimation deferred to Paper B 2026ap empirical companion (iteratively-
  versioned working paper; v1.0.0 N=2 twin pairs → v4.0.0 N=80-120 SMJ
  submission scale). Validation strategy four-case, illustrative for
  theory paper: (T1', PRIMARY illustrative case) Eisenhardt-Martin 2000
  SMJ + Zollo-Winter 2002 Organization Science dynamic-capabilities twin
  pair (Grok r3 §5 endorsed as strongest of three candidates); (T2,
  venue-fit) Kulkarni-Mantere-Greenwood et al. 2024 JMI with K3 ≈ P3
  multiple-discovery internal; (T1, HISTORICAL EXISTENCE PROOF for P4)
  Heisenberg-Schrödinger 1925/26 twin pair; (T3, ROBUSTNESS) self-
  application with 5+ companion renderings.

# ============================================================================
# Preamble: the Operator role and its era-dependent projections
# (closes the "is this too complex for humans" objection by generalizing
# the role above the human/AI instance distinction).
#
# v0.5.0: Per Grok r2 § single_most_important_thing_to_keep + § contribution-
# sprawl gap (NF3), the Operator role + era-dependent projection table is
# now FOREGROUNDED as the paper's PRIMARY contribution (Contribution 1).
# The three-level hierarchy, the schema v0.2, the cost-asymmetry theorem,
# and the spine-first protocol are now positioned as OPERATIONALIZATIONS of
# the role-theoretic move — co-equal-contribution framing rejected.
# ============================================================================
operator_role:
  contribution_status: "PRIMARY (Contribution 1 v0.5.0; role-theoretic move foregrounded per Grok r2 NF3 closure)"
  position: >-
    The schema is machine-operable by design. The role-level abstraction is
    the Operator: the agent (or composition of agents) performing the
    operations the framework specifies. Operator projections vary by era
    and capability; the role's operations do not. This is the same
    role-as-projection move OST applies to organizational roles.
  rationale: |
    The cost-asymmetry result (P3) implies that meaning operations — graph
    construction, dependency tracing, structural verification — become
    cheap under AI mediation while meaningfulness operations — cohort-
    specific prose rendering — stay expensive. The SPINE.yaml is the
    meaning-operations layer made operational. If the operator role's
    operations look unwieldy for a single-human projection of the role,
    that is the framework predicting its own operational shape: the
    operations are intrinsic to the role; the projection (who/what
    performs them) varies across eras.
  operator_projections:
    - era: "Pre-AI (and non-AI domains)"
      composition: "Operator = Human(s) alone"
      note: "All operations executed via human projection; no instance distinction needed."
    - era: "AI-assisted current standard"
      composition: "Operator = Human + AI tools (calculators, search, formatters)"
      note: "Some deterministic operations delegated to tools; theoretical commitments retained by human."
    - era: "Post-AI (the mode this paper exhibits)"
      composition: "Operator = Human reviewing AI-authored structural substrate"
      note: "Structural extraction by AI; FORK/REBASE/judgment by human; rendering by either with the other as reviewer."
    - era: "Stretch: AI-primary"
      composition: "Operator = AI primary with human supervision at FORK gates"
      note: "AI handles most operations; human's job becomes goal-setting and structural-commit approval."
  operations_by_role:
    structural_substrate_operations:
      items:
        - "Extract observations / measurements / methods / findings from raw work"
        - "Maintain proposition DAG, edge types, provenance metadata"
        - "Check structural consistency; surface rivals; run robustness checks"
        - "Generate prose drafts from the spine for cohort-specific editing"
      note: "Era-dependent projection: pre-AI by human; post-AI typically by AI under human review."
    judgment_operations:
      items:
        - "Decide which substrate slice to query (Operator's first-person substrate access)"
        - "Decide FORK / REBASE / MERGE on each surfaced claim (theoretical commitment)"
        - "Author the cohort-specific prose rendering (meaningfulness operations)"
        - "Verify the substrate operations reflect the operator's intent"
      note: "Era-invariant: stays with human projection across all current and near-future composition modes."
  related_corpus:
    - paper_key: orgschema-role-as-projection
      relationship: extends
      description: "OST's role-as-projection move: roles are abstractions; human / team / function-bundle instances project the role differently. Applied here to the Operator role across eras."
    - paper_key: zharnikov-2026d
      relationship: parallel_structure
      description: "Paper Spec v0.1.0 already framed papers as machine-operable specs; this generalizes to the operator-level."
    - paper_key: zharnikov-2026e
      relationship: parallel_structure
    - paper_key: zharnikov-2026am
      relationship: parallel_structure
      description: "Specification Readiness at the organizational level; operator-role projection at the artifact level."
    - paper_key: project_researcher_substrate_operator_judgment
      relationship: extends
      description: "Researcher-as-Operator memory; the Operator generalization replaces the awkward Human-vs-AI framing with a role-as-projection structure."
  body_sections: ["Section 8 — Discussion: the Operator role and its era-dependent projections"]

