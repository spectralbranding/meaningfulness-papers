# SPINE.yaml — Layered Knowledge Artifacts Under Generative AI
#
# First paper drafted under the spine-first drafting protocol per CLAUDE.md
# item 0aa + [internal path removed]
#
# This file is the canonical structured representation of the paper's
# meaning. Prose in paper.md (when drafted at Phase 3) MUST trace every
# claim to a node here. FORK / REBASE / MERGE operations append rows in
# `changelog` below.
#
# Schema v0.2 (extended): observations, methods, measurements, findings,
# derivations, alternative_explanations, robustness_checks, limitations,
# negative_findings, assumption_atoms — all first-class. Provenance on every
# node. The schema is intentionally machine-operable; humans review and edit
# selectively, not author top-to-bottom. That is itself a structural claim
# of this paper (the schema's complexity is the cost-asymmetry result
# operationalized — see thesis below).

spine_version: "0.2"              # schema version (extended; see SPINE_FIRST_DRAFTING_PROTOCOL.md §"Schema v0.2")
spine_doc_version: "0.8.0"
paper_key: "2026ao"               # placeholder; verify CANONICAL_REFERENCES.md at Phase 5; Paper A only post-PIVOT-SPLIT
paper_b_companion_key: "2026ap"   # empirical companion; scoping at [internal path removed]
status: "Phase 0.5 + Phase 4 FORK x2 — locked under schema v0.2 (Paper A theory-only post-PIVOT-SPLIT; v0.7.3 revision after review adds 8 verified external_anchors plus records NF11-NF14; cumulative SF1 hallucination rate across r1-r5 + post1 + post2 ≈ 17 catches / ~53%)"
target_venue_primary: "Organization Science"
target_venue_secondary: "Journal of Management Inquiry"
target_venue_tertiary: "AI & Society"

title: >-
  Spec-Based Research in the Post-AI Era: A Cost-Asymmetry Theory of
  Meaning and Meaningfulness in Organizational Knowledge Work

thesis: |
  Generative AI shifts the cost-structure of knowledge work asymmetrically
  across the three-level hierarchy of scholarly artifacts (log → semantic
  graph → rendering). Meaning (the graph-extractable structure of claims,
  dependencies, and evidence) becomes cheap to verify and recombine at
  scale; meaningfulness (the context-dependent prose realization for a
  specific cohort) does not, and may become more costly relative to the new
  equilibrium. This asymmetry creates a management-theoretic cost-allocation
  problem. The three-level hierarchy is the analytical tool; the spine-first
  drafting protocol is the prescriptive intervention; the SPINE.yaml v0.2
  schema is the operational artifact — and its intentional complexity is
  the first operationalization of the cost-asymmetry result: a schema that
  is unwieldy for a human to author top-to-bottom is exactly what the
  cost-asymmetry predicts, because the spine is the meaning-operations layer
  where AI's comparative advantage is largest. The paper exhibits the
  post-AI knowledge-work organizational form by building it. The PRIMARY
  CONTRIBUTION (v0.6.0 PIVOT-SPLIT scoping) is the Operator role +
  era-dependent projection of structural-versus-judgment operations;
  the cost-asymmetry mechanism, the typed-DAG specification, the
  three-level hierarchy, the SPINE.yaml v0.2 schema, and the spine-first
  drafting protocol are operationalizations of the role-theoretic move,
  subordinated to online appendix structure (per the review NR1).
  Primary propositions locked v0.6.0: P1 (separability) + P4 (rendering-
  equivalence under spine-preservation). P2 (recombination) and P3
  (verification-cost asymmetry) are stated as theoretically-derived
  predictions with explicit falsifier specifications; empirical
  estimation deferred to Paper B 2026ap empirical companion (iteratively-
  versioned working paper; v1.0.0 N=2 twin pairs → v4.0.0 N=80-120 SMJ
  submission scale). Validation strategy four-case, illustrative for
  theory paper: (T1', PRIMARY illustrative case) Eisenhardt-Martin 2000
  SMJ + Zollo-Winter 2002 Organization Science dynamic-capabilities twin
  pair (the review §5 endorsed as strongest of three candidates); (T2,
  venue-fit) Kulkarni-Mantere-Greenwood et al. 2024 JMI with K3 ≈ P3
  multiple-discovery internal; (T1, HISTORICAL EXISTENCE PROOF for P4)
  Heisenberg-Schrödinger 1925/26 twin pair; (T3, ROBUSTNESS) self-
  application with 5+ companion renderings.

# ============================================================================
# Preamble: the Operator role and its era-dependent projections
# (closes the "is this too complex for humans" objection by generalizing
# the role above the human/AI instance distinction).
#
# sprawl gap (NF3), the Operator role + era-dependent projection table is
# now FOREGROUNDED as the paper's PRIMARY contribution (Contribution 1).
# The three-level hierarchy, the schema v0.2, the cost-asymmetry theorem,
# and the spine-first protocol are now positioned as OPERATIONALIZATIONS of
# the role-theoretic move — co-equal-contribution framing rejected.
# ============================================================================

# ============================================================================
# Boundary conditions (closes Grok F1) — joint sufficient for the framework
# ============================================================================
boundary_conditions:
  - id: C1
    statement: "Authoring is version-controlled."
    observable: "Presence of commit/revision history with attribution."
    excludes: "Single-author handwritten manuscripts; broadcast media without provenance."
    provenance:
      created_by: "author"
      created_at: "2026-05-26"

  - id: C2
    statement: "Claims are propositional, not purely narrative."
    observable: "Presence of identifiable propositional claim markers with truth conditions."
    excludes: "Pure fiction, lyric poetry, devotional or ritual text."
    provenance:
      created_by: "author"
      created_at: "2026-05-26"

  - id: C3
    statement: "Audience-schema divergence is non-trivial."
    observable: "Measured lexical/structural distance between author-domain and target-cohort domain exceeds threshold."
    excludes: "Internal documentation read only by authors; same-discipline expert correspondence."
    provenance:
      created_by: "author"
      created_at: "2026-05-26"

  - id: C4
    statement: "Volume of artifacts exceeds unaided human reviewer verification capacity."
    observable: "Artifact volume per unit time relative to community reviewer capacity."
    excludes: "Single-paper one-shot evaluation; bounded artisan-craft domains."
    provenance:
      created_by: "author"
      created_at: "2026-05-26"

# ============================================================================
# Explicit names of domains where the theory does NOT apply. Counter-balances
# high-stakes executive sensemaking or pure discovery science without
# reproducibility pressure" recommendation.
# ============================================================================
negative_scope_conditions:
  - id: NSC1
    statement: >-
      Routine operational work without propositional structure.
    domain_examples: "Customer-service call scripts; production-line work instructions; commodity-form-filling work."
    why_excluded: >-
      C2 (claims-are-propositional) fails: routine operational artifacts
      consist of procedural directives, not propositional claims with
      truth-conditions. The L → S extraction operator σ has no propositional
      content to extract. The framework does not contradict prior
      operations-research / work-design theory in this domain.

  - id: NSC2
    statement: >-
      Real-time control systems where L (log), S (spine), and R (rendering)
      collapse into single closed-loop execution.
    domain_examples: "Trading-algorithm execution loops; autonomous-vehicle perception-action loops; physiological feedback control."
    why_excluded: >-
      C1 (version-controlled authoring) fails operationally: real-time
      systems lack a stable L→S→R cycle because L is consumed before
      σ can extract; the three layers are not separately observable. The
      framework's cost-asymmetry result presupposes a temporal separation
      between substrate maintenance and rendering production that real-time
      systems do not exhibit.

  - id: NSC3
    statement: >-
      Narrative-only scholarship without propositional cores.
    domain_examples: "Literary criticism that operates as exegesis; ethnographic narrative without explicit claim-graph; philosophical phenomenology that resists propositional reformulation in principle."
    why_excluded: >-
      C2 (claims-are-propositional) is principle-failed, not contingently
      failed: narrative-only scholarship resists propositional reformulation
      as a methodological commitment, not a temporary lack of formalization.
      The framework cedes this domain explicitly to interpretive traditions
      (Geertz, Ricoeur, Latour-as-narrative) rather than colonizing it.

  - id: NSC4
    statement: >-
      High-stakes executive sensemaking under genuine uncertainty.
    domain_examples: "First-principles strategic decisions during crisis; novel venture-creation acts where no comparable spine exists; political-leadership judgment calls during crises."
    why_excluded: >-
      C4 (volume-exceeds-verification-capacity) is principle-inverted:
      single-instance high-stakes judgment is characterized by deliberate
      slow deliberation, not by volume pressure. The Operator-role-
      structural/judgment split is irrelevant because the judgment side
      already dominates by design; AI-projection cost-advantage does not
      arise. The framework cedes this domain to traditional sensemaking
      theory (Weick; Maitlis-Christianson).

  - id: NSC5
    statement: >-
      Pure discovery science without reproducibility pressure.
    domain_examples: "Pre-paradigmatic theoretical physics speculation; mathematical-conjecture exploration before formal proof; artistic-research practice without peer-review reproducibility commitment."
    why_excluded: >-
      C4 (volume-exceeds-verification-capacity) does not apply: the
      community standard for the artifact does not require verification
      at scale because there is no replicable substrate yet. The
      framework's cost-asymmetry result is irrelevant when verification
      cost is not yet a community-binding constraint.

