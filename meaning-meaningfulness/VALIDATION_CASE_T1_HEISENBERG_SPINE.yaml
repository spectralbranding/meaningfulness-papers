# ============================================================================
# Methods: the methodological apparatus of the formulation
# ============================================================================
methods:
  - id: H_M1
    statement: "Reinterpret each classical Fourier amplitude a_τ(n) of a periodic motion as a two-index array a(n, n-τ) labelled by pairs of stationary states; phase factors e^{iω(n)t} become e^{iω(n,n-τ)t}."
    type: "formal_reformulation"
    inputs: [H_O1, H_O2]
    outputs: ["The kinematic array a(n,m) for position x(t); the combination law (eqs. 7-8)"]
    code_anchor: "n/a (analytic prescription)"
    reproducibility:
      seed: "deterministic prescription"
      version: "Heisenberg 1925 §1"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 around eqs. (1)-(8) (p.3-5)"

  - id: H_M2
    statement: "Define multiplication of two such arrays by the 'natural' rule c(n, n-β) = Σ_κ a(n, n-κ) b(n-κ, n-β); this is the unique law forced by combining frequency-conservation under the Ritz principle. (In Heisenberg's text the operation is given by the explicit sum; Born subsequently identifies it as matrix multiplication.)"
    type: "algebraic_definition"
    inputs: [H_O2, H_M1]
    outputs: ["The non-commutative algebra of kinematic arrays (Heisenberg 1925 eq. 7); explicit matrix multiplication law (Born-Jordan 1925 Ch. I eq. 3)"]
    reproducibility:
      seed: "deterministic"
      version: "Heisenberg 1925 §1; formalised Born-Jordan 1925 Ch. I"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 eq. (7)-(8) (p.5); Born-Jordan 1925 Ch. I §1 eq. (3) (p.3)"

  - id: H_M3
    statement: "Impose the classical equation of motion ẍ + f(x) = 0 array-by-array on the new kinematic variables — i.e., demand that the same functional form of the equation of motion holds when x is replaced by the array."
    type: "formal_postulation"
    inputs: [H_M1, H_M2]
    outputs: ["Recursion relations for the array entries (Heisenberg 1925 eqs. 18-19)"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §2 eqs. (11), (17)-(19) (p.6, p.10)"

  - id: H_M4
    statement: "Replace the Bohr-Sommerfeld phase-integral quantisation ∮ p dq = nh with the Thomas-Kuhn sum-rule analogue: a sum over squared array entries weighted by transition frequencies equals h (Heisenberg 1925 eq. 16); the Born-Jordan refinement (1925 eq. 37-38) sharpens this to the matrix commutator pq - qp = (h/2πi)·1."
    type: "quantum_condition"
    inputs: [H_O5, H_M2, H_M3]
    outputs: ["Heisenberg 1925 eq. (16) sum rule; Born-Jordan 1925 eq. (38) sharpened canonical commutator"]
    code_anchor: "n/a"
    reproducibility:
      version: "Heisenberg 1925 §2; Born-Jordan 1925 Ch. II §3"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §2 eq. (16) (p.8); Born-Jordan 1925 eq. (37)-(38) (p.13-14)"

  - id: H_M5
    statement: "Diagonal entries of the Hamiltonian array H(n,n) are interpreted as the energies of the stationary states; transition frequencies are derived from differences of those diagonal entries via hν(n,m) = H(n,n) - H(m,m). The Bohr frequency condition becomes a theorem rather than a postulate."
    type: "interpretive_postulate"
    inputs: [H_M3, H_M4]
    outputs: ["Energy spectrum as diagonal of H; Bohr frequency condition derived as eq. (28) of Born-Jordan 1925"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Ch. II §4 eq. (28), (44) and surrounding text (p.13-15)"

  - id: H_M6
    statement: "Variational principle: equations of motion derived by extremising the diagonal sum D(L) = D(pq̇ - H(p,q)) under variation of the array entries of p and q; this delivers the canonical Hamiltonian equations of motion (Born-Jordan 1925 eqs. 34-35)."
    type: "variational_principle"
    inputs: [H_M2, H_M3]
    outputs: ["Canonical equations of motion q̇ = ∂H/∂p, ṗ = -∂H/∂q for arrays (Born-Jordan eq. 35)"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Ch. II §3 eqs. (33)-(35) (p.11-12)"

# ============================================================================
# Measurements: derived quantities computed via the methods on the inputs
