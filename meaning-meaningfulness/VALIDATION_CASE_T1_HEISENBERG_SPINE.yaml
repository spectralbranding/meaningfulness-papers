      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Ch. II §4 eqs. (40)-(44) (p.14-15)"

  - id: H_F6
    statement: >-
      The Goudsmit-Kronig-Hönl multiplet intensity formulas and the
      Ornstein-Burger sum rule (eq. 30 of Heisenberg 1925) emerge from the
