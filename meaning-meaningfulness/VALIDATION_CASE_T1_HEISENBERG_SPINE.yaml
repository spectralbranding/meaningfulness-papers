# ============================================================================
# Propositions: theoretical claims (H-prefixed to distinguish from parent P1-P4)
# ============================================================================
propositions:
  - id: H1
    statement: >-
      Kinematic and mechanical relationships in the atomic regime must
      be reinterpreted so that the formalism's primitive quantities are
      themselves observable, in principle; the position and orbital
      period of an electron, having no observable status, are no longer
      eligible inputs to the theory.
    type: "ontological"
    conditions: "HC2"
    antecedents: []
    falsifier: "If a theory built on unobservable kinematic quantities (e.g., electron trajectories) accurately reproduces all atomic spectroscopy in its full domain — including the 'crossed fields' problem where Bohr-Sommerfeld is known to fail — H1's foundational claim is wrong."
    evidence:
      - type: empirical
        anchor: "Bohr-Sommerfeld success on hydrogen + failure on crossed fields and multi-electron atoms"
        citation_keys: []
        citation_role: "motivating_problem"
    ruled_out_rivals: [H_A1]
    body_sections: ["Heisenberg 1925 §0 abstract; §1 ¶1-2"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 abstract sentence: 'In this paper, we will attempt to achieve a quantum-theoretical mechanics that is based exclusively upon relationships between quantities that are observable, in principle.'"

  - id: H2
    statement: >-
      The natural representative of a kinematic variable in the new
      mechanics is a two-index array of complex amplitudes a(n, n-τ)
      with associated phase factor e^{iω(n,n-τ)t}, where (n, n-τ)
      indexes a pair of stationary states and ω(n,n-τ) is the observed
      transition frequency between them.
    type: "ontological"
    conditions: "HC1, HC2"
    antecedents: [H1]
    falsifier: "If single-index Fourier-coefficient representations a_τ(n) suffice to encode all observable atomic spectra under any consistent dynamical postulate, H2 is over-built."
    evidence:
      - type: analytic
        anchor: "Heisenberg 1925 §1: classical x(t) → array a(n,n-τ)·e^{iω(n,n-τ)t}"
        citation_role: "definitional_source"
    ruled_out_rivals: []
    body_sections: ["Heisenberg 1925 §1 eqs. (1)-(2)"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 eqs. (1)-(2) (p.3)"

  - id: H3
    statement: >-
      The multiplication law of these arrays is non-commutative:
      a(n,m)·b(m,k) ≠ b(n,m)·a(m,k) in general. Position and momentum,
      as arrays, do not commute.
    type: "ontological"
    conditions: "HC1, HC2"
    antecedents: [H2]
    falsifier: "If the Ritz combination principle is compatible with a commutative algebra of observable arrays, H3 is unforced."
    evidence:
      - type: analytic
        anchor: "Heisenberg 1925 §1: 'whereas classically x(t) y(t) is always equal to y(t) x(t), this does not need to be the case in quantum theory, in general'; formalised Born-Jordan 1925 Ch. I §1: 'the commutative law of multiplication is not true'"
        citation_role: "definitional_source"
    ruled_out_rivals: [H_A1]
    body_sections: ["Heisenberg 1925 §1 paragraph after eq. C(n,τ); Born-Jordan 1925 Ch. I §1 eq. (3) and surrounding text"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 p.6; Born-Jordan 1925 Ch. I §1 p.3"

  - id: H4
    statement: >-
      Position and momentum arrays satisfy the canonical commutation
      relation pq - qp = (h/2πi)·1 (the 'sharpened quantum condition').
    type: "ontological"
    conditions: "HC1, HC2"
    antecedents: [H3, H6]
    assumptions: [H_AA1, H_AA2]
    falsifier: "Any consistent realisation of the array calculus reproducing atomic spectra in which the commutator equals some other scalar (or a non-scalar operator) refutes H4."
    evidence:
      - type: analytic
        anchor: "Born-Jordan 1925 §3 derivation of eq. (38) from Thomas-Kuhn sum rule + Hamiltonian equations of motion"
        citation_keys: []
        citation_role: "definitional_source"
    ruled_out_rivals: [H_A2]
    body_sections: ["Born-Jordan 1925 Ch. II §3 eqs. (37)-(38)"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 §3 eq. (38) (p.14)"

  - id: H5
    statement: >-
      The energies of the stationary states are the diagonal entries
      H(n,n) of the Hamiltonian array; equivalently, the Hamiltonian is
      diagonal in the stationary-state basis under the dynamics induced
      by the array equations of motion.
    type: "ontological"
    conditions: "HC1; Hamiltonian admitting a Hermitian array representative"
    antecedents: [H2, H6]
    falsifier: "Existence of a stationary-state representation under which H is non-diagonal and the equations of motion still hold falsifies H5."
    evidence:
      - type: analytic
        anchor: "Born-Jordan 1925 §4 derivation of Ḣ = 0 (eq. 44) and the interpretation of diagonal H(nn) as state energies"
        citation_role: "definitional_source"
    ruled_out_rivals: []
    body_sections: ["Born-Jordan 1925 Ch. II §4 around eq. (28), (44)"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 §4 (p.13-15)"

  - id: H6
    statement: >-
      The classical canonical equations of motion q̇ = ∂H/∂p, ṗ = -∂H/∂q
      are imposed unchanged in form on the position- and momentum-arrays,
      with the symbolic differentiation of matrix functions defined per
      Born-Jordan 1925 §2.
    type: "ontological"
    conditions: "HC1; H expressible as a polynomial or analytic function of p, q"
    antecedents: [H2, H3]
    falsifier: "If atomic spectra require a different dynamical equation in the array calculus (e.g., a non-Hamiltonian dissipative term) to match observation, H6 fails."
    evidence:
      - type: analytic
        anchor: "Heisenberg 1925 §2 (eq. 11) — equation of motion imposed in classical form; Born-Jordan 1925 §3 (eq. 32, 35) — variational derivation"
        citation_role: "definitional_source"
    ruled_out_rivals: []
    body_sections: ["Heisenberg 1925 §2; Born-Jordan 1925 Ch. II §3"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §2 eq. (11) (p.6); Born-Jordan 1925 §3 eqs. (32), (35) (p.11-12)"

  - id: H7
    statement: >-
      The Bohr frequency condition is a theorem of the new mechanics:
      hν(n,m) = H(n,n) - H(m,m) follows from H5 + H6 + H4, rather than
      being an independent postulate.
    type: "ontological"
    conditions: "HC1, HC2 + H5, H6, H4"
    antecedents: [H4, H5, H6]
    falsifier: "Independent of the new mechanics' algebraic structure, Bohr's condition has direct empirical content; refuting it spectroscopically would refute the embedding theory as well."
    evidence:
      - type: analytic
        anchor: "Born-Jordan 1925 §4 derivation hν(nm) = H(nn) - H(mm) on p.15 after eq. (41)-(44)"
        citation_role: "definitional_source"
    ruled_out_rivals: []
    body_sections: ["Born-Jordan 1925 Ch. II §4 (p.14-15)"]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 §4 (p.14-15)"

# ============================================================================
# Derivations: reasoning bridges
# ============================================================================
derivations:
  - id: H_D1
    statement: >-
      Bridge from Ritz combination principle (H_O2) + reinterpretation
      ansatz (H1, H2) to the non-commutative multiplication rule (H3).
      The 'natural' choice c(n,n-β) = Σ_κ a(n,n-κ)b(n-κ,n-β) is the
      unique law that preserves frequency-combination ν(n,n-κ)+
      ν(n-κ,n-β) = ν(n,n-β); commutativity is broken because index
      conjugation is asymmetric.
    from: [H1, H2, H_O2]
    to: H3
    reasoning_type: "deductive"
    formal_proof_anchor: "Heisenberg 1925 §1 eqs. (7)-(8) and surrounding text (p.5)"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 (p.5)"

  - id: H_D2
    statement: >-
      Bridge from Thomas-Kuhn dispersion sum rule (H_O5) + array
      equations of motion (H6) to the sharpened canonical commutator
      (H4). Born-Jordan §3 shows that pq - qp must be a diagonal matrix
      (off-diagonal entries forced to zero by the equations of motion)
      and its diagonal entries are fixed by the sum rule to be the
      scalar h/2πi.
    from: [H_O5, H6]
    to: H4
    reasoning_type: "deductive"
    formal_proof_anchor: "Born-Jordan 1925 Ch. II §3 around eq. (37)-(38) (p.13-14)"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 §3 (p.13-14)"

  - id: H_D3
    statement: >-
      Bridge from canonical commutator (H4) + array equations of motion
      (H6) to the law of energy conservation Ḣ = 0 (H_F5) and Bohr's
      frequency condition (H7). The proof proceeds by computing ḋ for
      d = pq - qp; the variational identity and the symbolic
      differentiation rules of Born-Jordan §2 force d to be diagonal,
      Ḣ = 0, and hν(nm) = H(nn) - H(mm).
    from: [H4, H6]
    to: H7
    reasoning_type: "deductive"
    formal_proof_anchor: "Born-Jordan 1925 Ch. II §4 eqs. (40)-(44) (p.14-15)"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 §4 (p.14-15)"

  - id: H_D4
    statement: >-
      Bridge from anharmonic equation of motion ẍ + ω₀²x + λx² = 0 + array
      recursion (H_M3) + ground-state condition a(n₀, n₀-τ) = 0 to the
      closed-form amplitudes (eq. 21) and the energy spectrum eq. (23):
      W = (n+½)ħω₀. Heisenberg first solves the harmonic case then
      perturbs in λ; the half-integer shift in n+½ emerges directly from
      the boundary condition n₀ = 0.
    from: [H_M3, H_M4]
    to: H_F2
    reasoning_type: "deductive"
    formal_proof_anchor: "Heisenberg 1925 §3 eqs. (17)-(23), (27) (p.9-12)"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §3 (p.9-12)"

# ============================================================================
# Alternative explanations: rivals ruled out by the formulation
# ============================================================================
alternative_explanations:
  - id: H_A1
    statement: >-
      Bohr-Sommerfeld old quantum theory: classical electron orbits
      with phase-integral quantisation ∮p dq = nh, supplemented by
      ad hoc selection rules for transitions. The atomic kinematics
      remain classical (visualisable orbits with well-defined position
      and period); quantisation is imposed externally on classically
      allowed motions.
    rules_out_required: [H_F2, H_F3, H_F6]
    ruled_out_by: [H_F2, H_F3, H_F4, H_F6]
    rules_out_status: "rejected"
    reasoning: >-
      Heisenberg 1925 §0: '... fundamental difficulties will appear
      already in the problem of "crossed fields" ... namely, that the
      reaction of the atom to periodically-varying fields certainly
      cannot be described by the stated rules and that ultimately an
      extension of the quantum rules to the treatment of the atom and
      many atoms has proven to be impossible.' Furthermore, H_F3
      (zero-point energy ħω₀/2) is a quantitative prediction that the
      Bohr-Sommerfeld picture does not supply, and H_F4 (the commutator
      having a definite scalar value) has no analogue in the old theory.
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §0 ¶2-3 (p.1); Born-Jordan 1925 Introduction (p.1)"

  - id: H_A2
    statement: >-
      Classical mechanics applied straightforwardly to atomic systems
      (the limit λ → 0 or h → 0 of the new theory, without imposing the
      quantum condition).
    rules_out_required: [H_O1, H_O3]
    ruled_out_by: [H_O1, H_O3, H_F3]
    rules_out_status: "rejected"
    reasoning: >-
      Classical mechanics predicts continuous radiation spectra rather
      than discrete spectral lines (H_O1); does not produce the
      observed band-spectrum patterns of Kratzer 1922 (H_O3); does not
      produce the zero-point energy (H_F3) which Heisenberg notes is
      necessary even at the harmonic-oscillator level.
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §0 ¶3 (p.1); §3 around eq. (23) (p.11)"

# ============================================================================
# Assumption atoms
# ============================================================================
assumption_atoms:
  - id: H_AA1
    statement: >-
      Among the possible solutions of the array equations of motion +
      quantum condition, the physically realised one is the simplest /
      lowest-rank — explicitly stated as an open question by Heisenberg
      at the end of §3.
    type: "solution_selection"
    relaxable: true
    relaxation_consequence: >-
      Multiple solutions of (30)-(32) consistent with the boundary
      conditions exist; Heisenberg verifies match only for 'the simplest
      solution.' If a non-simplest solution is physically realised in
      some atomic system, H4-H7 may need restriction.
    affects: [H4, H_F6, H_m4]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §3 closing paragraph (p.15): 'these expressions ... only one solution ... not simply accept ... only solution of (30), (31), (32)'"

  - id: H_AA2
    statement: >-
      The Hamiltonian function admits an analytic representation
      H(p,q) as a sum of finite/infinite products of powers of p and q;
      Born-Jordan extend this to Hermitian-symmetric H* = ½(p²q + qp²)
      orderings.
    type: "form_of_H"
    relaxable: true
    relaxation_consequence: >-
      For non-analytic Hamiltonians (singular potentials, e.g., the
      Coulomb potential at r = 0) the symbolic-differentiation machinery
      of Born-Jordan §2 does not apply directly; multi-electron and
      relativistic extensions are explicitly left to subsequent work.
    affects: [H6, H_F5]
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Ch. I §1 (definition of polynomial matrix functions p.4); §4 closing paragraph 'H* = ½(p²q + qp²)' (p.15)"

# ============================================================================
# Limitations the papers explicitly acknowledge
# ============================================================================
limitations:
  - id: H_L1
    statement: >-
      The mathematical implementation of the program can be carried out
      'only in the simplest cases, for now' — explicitly: hydrogen-like
      atoms and the harmonic/anharmonic oscillator. Many-electron atoms
      and atoms in 'crossed fields' beyond perturbative order are not
      treated.
    affects: [H_F2, H_F5, H_F6]
    severity: "high"
    mitigation: "Deferred to subsequent work; Born-Jordan 1925 Introduction promises generalisation to many degrees of freedom and to electromagnetic-field interaction in a continuation."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §2 (p.8): 'the actual mathematical implementation of that can be achieved only in the simplest cases, for now'; Born-Jordan 1925 Introduction (p.1-2)"

  - id: H_L2
    statement: >-
      Relativistic mechanics is explicitly outside scope. Born-Jordan
      1925 Introduction: 'we will not restrict our treatment to either
      non-relativistic mechanics or to calculations with Cartesian
      coordinates' (stated as program goal), but the worked examples
      are all non-relativistic.
    affects: [H6, H_F5]
    severity: "medium"
    mitigation: "Deferred to subsequent work."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Introduction (p.1-2)"

  - id: H_L3
    statement: >-
      No geometric or visualisable picture for the array entries is
      offered; Heisenberg 1925 §1 explicitly: 'a geometric
      interpretation of such quantum-theoretical phase relationships
      in analogy with the ones in the classical theory seems hardly
      possible.' This is a deliberate methodological feature, not a
      bug, but one that the founders flag.
    affects: [H1, H2, H3]
    severity: "low (by design)"
    mitigation: "None offered; treated as the price of obtaining a theory in only observable quantities. Schrödinger's wave-mechanics formulation (the parallel path of the twin pair) re-introduces a visualisable wave-function — exactly the surface-vocabulary difference whose underlying-spine equivalence is the focal interest of the T1 case."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 p.5 (phrase verbatim)"

  - id: H_L4
    statement: >-
      The term 'matrix' is not used by Heisenberg in the July 1925
      paper. He refers throughout to 'sets of quantities' or 'two-index
      ensembles of amplitudes' (in the Delphenich translation: 'array').
      Born recognised the multiplication law as matrix multiplication
      AFTER reading Heisenberg's draft; the matrix vocabulary is first
      systematically deployed in Born-Jordan 1925 (Chapter I §1).
      Whether this is a 'limitation' or a feature of vocabulary
      evolution is a matter of taste — it is recorded here because the
      historical record matters for the rendering-equivalence claim of
      the parent paper.
    affects: ["the entire vocabulary layer of the spine"]
    severity: "low (historical)"
    mitigation: "n/a — historical fact, not a defect"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Introduction (p.1-2): 'The mathematical tool is the matrix calculus ... A square array ... a so-called matrix ... is the representative of a physical quantity'; van der Waerden 1968 'Sources of Quantum Mechanics' editorial commentary"

  - id: H_L5
    statement: >-
      Half-integer vs integer quantum numbers: Heisenberg notes (§2
      p.7) that the array calculus 'will give rise to difficulties in
      the appearance of half-integer quantum numbers' and that
      empirically (notably Kratzer 1922 band spectra) half-integer
      formulas are sometimes demanded. The ground-state-zero condition
      a(n₀,n₀-τ) = 0 forces a particular choice but the calculus per
      se does not uniquely fix integer vs half-integer indexing.
    affects: [H_F3, H_F6, H_m1]
    severity: "medium"
    mitigation: "Ground-state condition (n₀ = 0) imposed as additional postulate."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §2 around eqs. (14)-(16) (p.7-8)"

# ============================================================================
# Negative findings
# ============================================================================
negative_findings:
  - id: H_NF1
    statement: >-
      No analogue of a single-particle wave function is constructed,
      and Heisenberg notes that no general method is offered for
      determining the spectrum of arbitrary Hamiltonians: 'except for
      a general relation between Kramers's dispersion formulas and
      equations (11) and (16), we can answer the questions that were
      posed above only in the entirely specialized cases that can be
      solved by a simple recursion.'
    expected_observation: "A general spectral-determination method for arbitrary H(p,q) at non-perturbative order."
    source_method: "Heisenberg's own self-assessment in §2"
    affects_nodes: [H6, H7, H_L1]
    motivates: []
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §2 p.8 ¶ before 'That general relationship between Kramers's dispersion theory and our equations (11), (16)...'"

