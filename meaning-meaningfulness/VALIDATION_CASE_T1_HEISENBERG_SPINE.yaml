# VALIDATION_CASE_T1_HEISENBERG_SPINE.yaml
#
# Retroactive spine extraction of the HEISENBERG PATH of the 1925-1926
# twin-pair natural experiment (matrix mechanics formulation of quantum
# mechanics). This is the T1 validation case for the meaningfulness paper
# (2026ao); the parallel SCHRODINGER PATH extraction lives in
# VALIDATION_CASE_T1_SCHRODINGER_SPINE.yaml (companion file).
#
# What this file IS: the spine of the matrix-mechanics formulation as it
# was argued in 1925-1926, in the vocabulary the original papers used.
# What this file IS NOT: a modern textbook reformulation; not a validation
# of Heisenberg/Born/Jordan against modern QM; not a translation of their
# claims into Hilbert-space language.
#
# The point of the twin-pair extraction is to show — by structural
# comparison of two independently-built spines — that the meaning graph
# converges across two radically different mathematical formalisms whose
# rendering vocabularies share almost no surface tokens. That convergence
# is the load-bearing existence-proof for P4 (rendering-equivalence
# under spine-preservation) of the meaningfulness paper.
#
# Sources extracted from:
#   Heisenberg 1925 "Über quantentheoretische Umdeutung kinematischer
#     und mechanischer Beziehungen" Zeit. Phys. 33, 879-893 (Delphenich
#     translation; research/references/heisenberg_1925_english_delphenich.pdf)
#   Born-Jordan 1925 "Zur Quantenmechanik" Zeit. Phys. 34, 858-888
#     (Delphenich translation;
#      research/references/born_jordan_1925_english_neoclassical.pdf)
#   Born-Heisenberg-Jordan 1926 "Zur Quantenmechanik II" (Three-Men paper)
#     engaged indirectly via citations in Born-Jordan 1925 §3 footnote
#     and standard physics-history secondary literature (van der Waerden
#     1968 "Sources of Quantum Mechanics" compilation cited as canonical
#     anchor; not extracted directly).

spine_version: "0.2"
spine_doc_version: "0.1.0"
case_key: "T1-HEISENBERG-PATH"
paper_key_of_parent: "2026ao"
status: "Phase 0.5 — initial extraction; coder = AI single-pass; awaiting inter-coder reliability check per AA2 of parent spine"

title: >-
  The Heisenberg-Born-Jordan matrix-mechanics formulation of quantum
  mechanics (1925-1926): spine extraction

thesis_of_the_path: |
  Mechanics in the atomic regime is to be rebuilt as an algebra of
  arrays (later: matrices) of complex transition amplitudes indexed by
  pairs of stationary states. The arrays are required by construction
  to involve only observable quantities — spectral frequencies and
  intensities — and to obey the Ritz combination principle as their
  composition law. Position and momentum, so reconceived, no longer
  commute; their commutator is the fixed quantity h/(2πi). Mechanical
  equations of motion are imposed in their classical form but applied
  to the arrays; energy is the diagonalised Hamiltonian; transition
  frequencies are differences of its diagonal entries (Bohr's
  frequency condition recovered as a theorem, not a postulate). The
  hydrogen spectrum, the anharmonic-oscillator energy levels, and
  multiplet/Zeeman intensities are reproduced as eigenvalues and
  squared array entries of the new formalism.

