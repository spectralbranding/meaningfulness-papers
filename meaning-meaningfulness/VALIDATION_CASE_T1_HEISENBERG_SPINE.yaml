# Boundary conditions of the path (what the formulation assumes about its
# domain of applicability — these are NOT relaxable within the path itself)
# ============================================================================
boundary_conditions:
  - id: HC1
    statement: "System is restricted, initially, to one degree of freedom; periodic (in the classical limit) motion."
    observable: "Single-coordinate Hamiltonian; classical orbit closes."
    excludes: "Aperiodic atomic motions (e.g., ionised hydrogen continuum); multi-electron atoms (left to a later treatment); relativistic dynamics."
    source_pdf_section: "Heisenberg 1925 §1 (¶ ending 'restrict ourselves to problems of one degree of freedom'); Born-Jordan 1925 Introduction"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "research/references/heisenberg_1925_english_delphenich.pdf §1 p.2"

  - id: HC2
    statement: "Theory traffics only in quantities observable in principle (spectral frequencies, transition intensities); unobservable kinematic quantities (electron position, orbital period) are excluded as inputs to the formalism."
    observable: "Every defined quantity in the array calculus maps to a measurable spectroscopic line or intensity."
    excludes: "Bohr-Sommerfeld trajectory pictures; visualisable electron orbits."
    source_pdf_section: "Heisenberg 1925 §0 opening abstract sentence + §1 ¶1-3"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "research/references/heisenberg_1925_english_delphenich.pdf p.1 abstract"

  - id: HC3
    statement: "The correspondence principle holds: in the large-quantum-number limit, the new quantum-theoretical quantities go over asymptotically into their classical Fourier-series analogues."
    observable: "Heisenberg eq. (21) — amplitudes a(n,n-τ) → classical amplitude τ-th Fourier coefficient as n → ∞."
    excludes: "A formulation that fails to reduce to classical mechanics in the high-n limit."
    source_pdf_section: "Heisenberg 1925 §3 ¶ after eq. (21)"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "research/references/heisenberg_1925_english_delphenich.pdf p.11 after eq. (21)"

