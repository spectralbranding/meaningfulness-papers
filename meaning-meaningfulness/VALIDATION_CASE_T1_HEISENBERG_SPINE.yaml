# ============================================================================
# NOTES (prose summary; per task brief)
# ============================================================================
# NOTES:
#
# Five-to-seven most load-bearing propositions of the Heisenberg path
# (in order of dependency depth, shallowest first):
#
#   H1 — Observable-quantities-only methodological commitment. The
#        ontological foundation; everything else inherits from it.
#   H2 — Two-index amplitude arrays as the new kinematic representative
#        (replacing the classical orbit). Pure ontological substitution.
#   H3 — Non-commutativity of the multiplication of those arrays. The
#        first structural rupture with classical mechanics.
#   H4 — Sharpened canonical commutator pq - qp = h/(2πi)·1 (Born-Jordan
#        1925 eq. 38). The single most-cited finding of the entire path;
#        the algebraic spine of matrix mechanics.
#   H6 — Classical canonical equations of motion imposed in form on the
#        arrays (with Born-Jordan §2 symbolic-differentiation machinery).
#   H7 — Bohr frequency condition recovered as a theorem rather than a
#        postulate — the unification result that justifies the entire
#        reconstruction.
#
# H_F3 (zero-point energy ħω₀/2 for the harmonic oscillator) is the
# single most-quoted novel empirical prediction of the path; H_F4
# (commutator value) is the most-quoted structural prediction.
#
# Coder judgment exercised explicitly (per AA2 of parent SPINE.yaml,
# inter-coder reliability check pending):
#
#   - I treated 'array' and 'matrix' as the SAME object at the spine
#     level, while flagging the vocabulary distinction in H_L4. A
#     reviewer could legitimately demand they be two nodes with an
#     equivalence edge between them; I judged the equivalence too
#     immediate (Born identifies it on first reading of Heisenberg's
#     draft) to warrant the duplication.
#   - I assigned the canonical commutator (H4) to the path as a whole
#     rather than to Born-Jordan 1925 specifically, on the grounds
#     that Heisenberg eq. (16) already states the Thomas-Kuhn sum-rule
#     form and Born-Jordan eq. (38) is the sharpening, not the
#     discovery. A reviewer prioritising historical authorship over
#     algebraic content would split this into two nodes.
#   - I did NOT separately code the Three-Men paper (Born-Heisenberg-
#     Jordan 1926) because the PDF was not available; secondary-source
#     and footnote engagement is reflected in external_anchors. The
#     general-degrees-of-freedom extension, perturbation theory, and
#     transformation theory belonging to the Three-Men paper are
#     therefore absent from this spine; this is a known gap rather
#     than a coder choice.
#   - I retained Heisenberg's original vocabulary ('amplitudes',
#     'arrays', 'sets of quantities') in node statements per the task
#     constraint to avoid retrofitting modern textbook language. The
#     word 'matrix' appears only where Born-Jordan use it.
#
