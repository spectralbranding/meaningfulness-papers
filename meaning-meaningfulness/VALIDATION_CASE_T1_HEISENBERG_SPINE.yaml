measurements:
  - id: H_m1
    statement: "Anharmonic-oscillator energy spectrum to second order in λ (Heisenberg 1925 eq. 27): W = (n+½)ħω₀ + (3λ²(n²+n+½)ħ²)/(8·4·ω₀²m) + O(λ⁴)."
    source_observations: [H_O3]
    generating_method: H_M3
    value: "W = (n+½)ħω₀ + correction series in λ"
    uncertainty: "Truncation at λ² (Heisenberg states he 'cannot generally prove' that higher periodic terms vanish but verified for terms computed)."
    units: "energy"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §3 eq. (27) (p.12)"

  - id: H_m2
    statement: "Amplitudes (transition matrix entries) for the harmonic oscillator: a(n,n-1) = φ·√(n!/(n-τ)!) (Heisenberg 1925 eq. 21); for the rotator, ν(n,n-1) = hn/(2π·m·a²) (eq. 28) and W = (h²/(8π²ma²))(n² - ¼) (eq. 29)."
    source_observations: [H_O1, H_O3, H_O4]
    generating_method: H_M3
    value: "Closed-form amplitudes and energy levels"
    uncertainty: "First-approximation expressions; agree with Kratzer band-spectra and with Goudsmit-Kronig-Hönl multiplet intensities."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §3 eqs. (21), (28), (29) (p.11, 13)"

  - id: H_m3
    statement: "Canonical commutator value: pq - qp = (h/2πi)·1 (Born-Jordan 1925 eq. 38, the 'sharpened quantum condition')."
    source_observations: [H_O5]
    generating_method: H_M4
    value: "h/2πi (equivalently iħ with modern sign convention)"
    uncertainty: "Exact identity; proved by combining Thomas-Kuhn sum rule with the equations of motion."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Ch. II §3 eqs. (37)-(38) (p.13-14)"

  - id: H_m4
    statement: "Transition intensities for the rotator-in-magnetic-field model: b(n,n-1; m,m-1) = α·√((n-m-1)(n-m)/(4(n-½)n)); b(n,n-1;m-1,m) = α·√((n+m)(n+m-1)/(4(n-½)n)); a(n,n-1;m,m) = α·√((n-m-1)(n+m)/((n-½)n)) (Heisenberg 1925 eqs. at p.15)."
    source_observations: [H_O4]
    generating_method: H_M2
    value: "Closed-form square-root expressions in (n,m)"
    uncertainty: "Heisenberg notes uniqueness is not strictly established — only that these are 'the simplest solution' of the array equations (30)-(32); broader-class solutions left open."
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 closing paragraph + eqs. (30)-(32) (p.14-15)"

# ============================================================================
# Findings: claims the papers make about WHAT IS THE CASE
# ============================================================================
findings:
  - id: H_F1
    statement: >-
      The two-index array a(n,n-τ) of complex transition amplitudes,
      multiplied by the rule a(n,n-β) = Σ_κ a(n,n-κ)·b(n-κ,n-β), reproduces
      the classical multiplication law in the high-quantum-number limit
      while remaining non-commutative for finite n.
    type: "structural_finding"
    source_measurements: [H_m2]
    generating_method: H_M2
    statistical_strength: "Analytic identity; not statistical."
    conditions: "HC1 + HC3"
    antecedents: [H_O1, H_O2, H_M1, H_M2]
    falsifier: "If two arrays of the prescribed shape that obey the Ritz combination law admit a commutative product preserving the same frequency-difference structure, H_F1 is wrong. (None has been exhibited.)"
    citation_role_in_path: "kinematic_foundation"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §1 eqs. (7)-(8) (p.5); 'this difficulty will not arise' phrase regarding xy vs yx (p.6)"

  - id: H_F2
    statement: >-
      Imposing the classical equation of motion ẍ + ω₀²x + λx² = 0 (or
      ẍ + ω₀²x + λx³ = 0) on the array x, together with the quantum
      condition (Heisenberg eq. 16 / Born-Jordan eq. 38), yields a finite
      recursion that determines all array entries uniquely up to a
      normalisation fixed by the ground-state condition a(n₀, n₀-τ) = 0
      for all τ > 0.
    type: "derivational_finding"
    source_measurements: [H_m1, H_m2]
    generating_method: H_M3
    statistical_strength: "Analytic identity for first-approximation calculation; Heisenberg notes higher-order terms verified case-by-case (p.12)."
    conditions: "HC1; ground-state existence"
    antecedents: [H_M3, H_M4]
    falsifier: "If the recursion under-determines or over-determines the array entries for some anharmonic oscillator, H_F2 fails."
    citation_role_in_path: "constructive_existence_proof"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §3 eqs. (17)-(23) (p.9-11)"

  - id: H_F3
    statement: >-
      For the harmonic oscillator the energy is W = (n+½)ħω₀ rather than
      the classical W = nħω₀ — i.e., the new formalism predicts a
      zero-point energy ħω₀/2 absent from the Bohr-Sommerfeld picture.
    type: "empirical_finding"
    source_measurements: [H_m1]
    generating_method: H_M3
    statistical_strength: "Analytic, exact in first approximation."
    conditions: "HC1"
    antecedents: [H_M3, H_M4]
    falsifier: "If careful low-temperature molecular-vibrational measurements show zero residual energy in the vibrational ground state, H_F3 is wrong."
    citation_role_in_path: "novel_empirical_prediction"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Heisenberg 1925 §3 around eq. (23) (p.11): 'In this picture, the energy cannot be represented by classical mechanics ... but it will have the form (23).'"

  - id: H_F4
    statement: >-
      The matrix commutator pq - qp = (h/2πi)·1 is exact (Born-Jordan
      1925 eq. 38, the 'sharpened quantum condition'); it follows from
      the Thomas-Kuhn sum rule plus the Hamiltonian equations of motion
      and the requirement that the off-diagonal entries of pq - qp
      vanish under the imposed dynamics.
    type: "structural_finding"
    source_measurements: [H_m3]
    generating_method: H_M4
    statistical_strength: "Exact analytic identity."
    conditions: "HC1, HC2"
    antecedents: [H_M4, H_M6]
    falsifier: "If any consistent realisation of the array calculus yields a different scalar for the canonical commutator, H_F4 fails."
    citation_role_in_path: "central_algebraic_law"
    provenance:
      created_by: "ai:claude-opus-4.7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_HEISENBERG_extraction_prompt_2026-05-26"
      created_at: "2026-05-26"
      source_log_event: "Born-Jordan 1925 Ch. II §3 eqs. (37)-(38) and surrounding derivation (p.13-14)"

  - id: H_F5
    statement: >-
      The law of energy conservation Ḣ = 0 and Bohr's frequency condition
      hν(n,m) = H(n,n) - H(m,m) follow as theorems from the matrix
      equations of motion plus the sharpened quantum condition; they are
      no longer independent postulates.
    type: "derivational_finding"
    source_measurements: []
    generating_method: H_M6
    statistical_strength: "Analytic proof."
    conditions: "HC1 + Hamiltonian of form H = p²/2m + U(q) or any analytic H(p,q) admitting the symmetrisation H* of Born-Jordan §4."
    antecedents: [H_M4, H_M5, H_M6]
