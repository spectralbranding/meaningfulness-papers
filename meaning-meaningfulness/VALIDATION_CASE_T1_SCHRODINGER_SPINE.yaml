methods:
  - id: S_M1
    statement: "Hamilton-Jacobi differential equation H(q, ∂S/∂q) = E as classical starting point; substitution S = K log ψ rewrites the dynamics in terms of a new field scalar ψ."
    type: "formal_derivation"
    inputs: [S_O1, S_O4]
    outputs: ["wave equation (Part I eq. 1', 1''')"]
    code_anchor: "n/a (pre-computational derivation; see Part I §1 pp.1-2)"
    reproducibility:
      seed: "n/a"
      version: "Schrödinger 1926, Annalen der Physik (4), vol. 79, p. 361"
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part I §1 pp.1-2"
    body_sections: ["Part I §1 (derivation from Hamilton-Jacobi)"]

  - id: S_M2
    statement: "Variation principle: δJ = δ ∫∫∫ {(∇ψ)² − (2m/K²)(E + e²/r)ψ²} dx dy dz = 0; the quantum condition is replaced by demanding stationarity over admissible ψ (everywhere real, single-valued, finite, continuous)."
    type: "formal_derivation"
    inputs: ["S_M1 output"]
    outputs: ["wave equation ∇²ψ + (2m/K²)(E + e²/r)ψ = 0"]
    reproducibility:
      seed: "n/a"
      version: "Part I §1 eqs. (3)-(5)"
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part I §1 p.2 eqs. (3)-(5)"
    body_sections: ["Part I §1 (variational principle)"]

  - id: S_M3
    statement: "Eigenvalue problem (Sturm-Liouville / boundary-value problem): solve the wave equation under the boundary requirement that ψ remain finite, single-valued, continuous on the entire q-space; the proper values E are those for which such solutions exist."
    type: "formal_derivation"
    inputs: ["S_M2 output"]
    outputs: ["discrete proper-value spectrum {Eₙ}; corresponding proper functions {uₙ(x)}"]
    reproducibility:
      seed: "n/a"
      version: "Part I §2 + Part II"
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part I §2 pp.2-12"
    body_sections: ["Part I §2; Part II"]

  - id: S_M4
    statement: "Optical-mechanical analogy: classical mechanics : wave mechanics :: geometrical optics : wave optics. The path of a representative point in configuration space corresponds to a light ray; the wave equation extends mechanics into the regime where path dimensions are comparable to the de-Broglie wavelength."
    type: "analogical"
    inputs: [S_O1, S_O4]
    outputs: ["physical motivation for the wave equation as a refinement of classical mechanics in the small-action regime"]
    citation_keys: ["de-broglie-1924-recherches-sur-la-theorie-des-quanta", "hamilton-1834-general-method"]
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Abstract pp.ix-xiii; Part II pp.13-29 (optical analogy)"
    body_sections: ["Part II (optical-mechanical analogy)"]

  - id: S_M5
    statement: "Operator-matrix correspondence: associate to each well-arranged function F(qₖ, pₖ) (i) the differential operator obtained by substituting pᵣ → K∂/∂qᵣ, with K = h/(2πi), and (ii) the matrix Fᵏˡ = ∫ρ(x)uₖ(x)[F, uₗ(x)]dx over an arbitrary complete orthonormal system {uᵢ(x)} on q-space; show that operator algebra carries faithfully to matrix algebra."
    type: "formal_derivation"
    inputs: [S_O6, "S_M3 output (orthonormal proper-function system)"]
    outputs: ["matrix realisation of any well-arranged dynamical function; equivalence proof apparatus"]
    code_anchor: "n/a (analytic; equivalence paper §2 pp.47-50)"
    reproducibility:
      seed: "n/a"
      version: "Equivalence paper §2, eqs. (3)-(9)"
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper §2 pp.47-50"
    body_sections: ["Equivalence paper §2-§4"]

  - id: S_M6
    statement: "Time-dependent perturbation theory: extend the stationary eigenvalue problem to time-varying potentials V(q, t) = V₀(q) + r(q, t); resolve r as Fourier components and compute perturbed proper functions ψ = uₖ(x) + w(x, t) to first order in the perturbation."
    type: "formal_derivation"
    inputs: ["S_M3 output", S_O3]
    outputs: ["dispersion theory; Stark-effect quantitative predictions; transition probabilities/intensities"]
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
