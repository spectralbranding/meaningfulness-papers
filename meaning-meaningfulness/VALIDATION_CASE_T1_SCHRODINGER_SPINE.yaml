# Limitations
# ============================================================================
limitations:
  - id: S_L1
    statement: >-
      Relativistic-magnetic generalisation is only sketched (Part IV §6); a
      fully relativistic single-electron wave equation reproducing
      Sommerfeld fine-structure plus Goudsmit-Uhlenbeck spin is not given
      here. (Dirac 1928 supplies it later.)
    affects: [S1, S2]
    severity: "medium"
    mitigation: "Dirac 1928 relativistic equation; Pauli 1927 spin matrices."
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part IV §6 pp.118-120"
    body_sections: ["Part IV §6"]

  - id: S_L2
    statement: >-
      Multi-electron atoms are handled only approximately; exact treatment
      of electron-electron correlation is not attempted in the 1926
      series.
    affects: [S2]
    severity: "medium"
    mitigation: "Hartree-Fock + later many-body methods."
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Abstract p.xiii"
    body_sections: ["Abstract"]

  - id: S_L3
    statement: >-
      Schrödinger's own continuous-charge-density interpretation of ψψ̄
      (S3) is acknowledged as provisional; he flags interpretive open
      questions about coupling to the electromagnetic field and the
      'paradox' of a system 'simultaneously in all kinematically imaginable
      positions' (Part IV §7 p.120). Born's probability-density reading
      published shortly after supersedes S3 in the eventual consensus —
      but importantly does NOT alter the equivalence claim S4, which is
      interpretation-independent.
    affects: [S3]
    severity: "high (for S3); none (for S4)"
    mitigation: "Born 1926 probability interpretation; later operational reading via measurement theory."
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part IV §7 p.120"
    body_sections: ["Part IV §7"]

  - id: S_L4
    statement: >-
      The equivalence proof (S4) treats only well-arranged (power-series-
      in-momentum) dynamical functions on a chosen orthonormal basis;
      Schrödinger notes the basis choice has 'no false step to be feared'
      epistemologically but acknowledges the proof's restriction to this
      function class. Full rigorous equivalence (Hilbert-space formulation
      of both theories under a common operator algebra) is supplied by
      von Neumann 1932.
    affects: [S4, S_D1]
    severity: "medium"
    mitigation: "von Neumann 1932 Mathematische Grundlagen der Quantenmechanik."
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper §4 p.56"
    body_sections: ["Equivalence paper §4"]

