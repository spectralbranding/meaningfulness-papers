      The proper-value spectrum of the wave equation has, in general,
      both a discrete part (the 'line spectrum', e.g. bound states of
      hydrogen, harmonic oscillator) and a continuous part (the 'band
      spectrum', e.g. hyperbolic-orbit hydrogen states above ionisation).
