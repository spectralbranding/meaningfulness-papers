      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper pp.45-61"
    body_sections: ["Equivalence paper §1-§5"]

  - id: S5
    statement: >-
      The optical-mechanical analogy (classical mechanics : wave mechanics ::
      geometrical optics : wave optics) supplies the physical motivation for
      the wave equation: classical mechanics is the eikonal-limit
      approximation of an underlying wave theory, valid only when system
      dimensions are large compared with the de-Broglie wavelength.
    type: "ontological"
    conditions: "C1"
    antecedents: []
    assumptions: []
    falsifier: "Failure of the wave equation to reproduce classical mechanics in the appropriate limit (h → 0 or large-system limit)."
    evidence:
