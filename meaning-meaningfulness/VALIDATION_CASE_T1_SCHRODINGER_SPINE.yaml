    body_sections: ["Part II; 'Continuous Transition' essay"]

# ============================================================================
# Derivations: reasoning bridges
# ============================================================================
derivations:
  - id: S_D1
    statement: >-
      From the operator-matrix correspondence (S_M5) plus the completeness
      of the wave-equation proper functions (S_F2, S_AA3), every matrix
      element predicted by Heisenberg-Born-Jordan can be computed as an
      integral over proper functions, and every spectroscopic transition
      derived in matrix mechanics is recovered as an eigenvalue-difference
      in wave mechanics — establishing S4.
    from: [S1, S2, S_F3]
    to: S4
    reasoning_type: "formal_proof"
    formal_proof_anchor: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper §§2-4, esp. eqs. (6), (18'), (21), (32)"
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper §§2-4"
    body_sections: ["Equivalence paper §2-§4"]

  - id: S_D2
    statement: >-
      From S1 + the variational formulation (S_M2) together with the
      Sturm-Liouville boundary-value structure (S_M3), the eigenvalue
      spectrum is discrete in regimes where ψ must vanish at infinity
      (bound states) and continuous in regimes where it need not
      (scattering states) — establishing S_F2.
    from: [S1, S_M2, S_M3]
    to: S_F2
    reasoning_type: "deductive"
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part I §2 + Part III"
    body_sections: ["Part I §2"]

# ============================================================================
# Alternative explanations (rivals)
# ============================================================================
alternative_explanations:
  - id: S_A1
    statement: >-
      Atomic spectra are explained by Bohr's 1913 quantisation of action
      (∮p dq = nh) on classical orbits; no wave mechanics required.
    rules_out_required: [S_F2, S_F3]
    ruled_out_by: [S_F1, S_F2, S_F4]
    rules_out_status: "rejected"
    reasoning: >-
      Bohr-Sommerfeld quantisation succeeds for hydrogen but fails for the
      helium atom and predicts integer azimuthal quantum numbers contradicted
      by Sommerfeld fine-structure (half-integral; cf. S_O5) and by the
      anomalous Zeeman effect. Wave mechanics reproduces the same hydrogen
      spectrum from a single underlying eigenvalue equation and accommodates
      the half-integral fine-structure naturally.
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Abstract p.xi; Part I §1 p.1"
    body_sections: ["Part I §1; Abstract"]

  - id: S_A2
    statement: >-
      Atomic-scale dynamics can be captured by purely classical continuum
      mechanics (no quantisation; no wave equation).
    rules_out_required: [S_F1]
    ruled_out_by: [S_F1, S_F2]
    rules_out_status: "rejected"
    reasoning: >-
      Classical mechanics produces no discrete spectra — hydrogen radiation
      would be continuous, contradicting the Balmer series. The wave equation
      adds a 'proper-value parameter' E whose spectrum is discrete precisely
      in the bound regime.
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Abstract pp.ix-x"
    body_sections: ["Part I §1"]

  - id: S_A3
    statement: >-
      Matrix mechanics is genuinely physically different from wave
      mechanics: the two theories predict different spectra or different
      transition probabilities for some atomic system, and one is correct
      while the other is not.
    rules_out_required: [S_F3]
    ruled_out_by: [S_F3, S4]
    rules_out_status: "rejected"
    reasoning: >-
      Schrödinger's equivalence proof (S_D1) shows that every matrix
      element computed in matrix mechanics equals an integral over
      wave-mechanical proper functions; the two formulations agree on every
      empirical prediction within their shared regime. Cf. equivalence paper
      p.57: 'every discussion of the superiority of the one over the other
      has only an illusory object'.
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper p.57 §5"
    body_sections: ["Equivalence paper §5"]

# ============================================================================
# Assumption atoms
# ============================================================================
assumption_atoms:
  - id: S_AA1
    statement: >-
      The wave-equation Hamiltonian operator is self-adjoint on its natural
      domain (relative to the appropriate density function ρ), guaranteeing
      real proper values and a complete orthonormal proper-function system.
    type: "method_validity"
    relaxable: true
    relaxation_consequence: >-
      Without self-adjointness, the proper values may be complex (non-
      physical energies) and completeness fails, jeopardising the matrix
      construction in S_M5 and hence S4.
    affects: [S_M3, S_M5, S2, S4]
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper §4 p.56 (uniqueness of symmetricalisation)"
    body_sections: ["Equivalence paper §4 (footnote on symmetricalisation)"]

  - id: S_AA2
    statement: >-
      ψ is a real (or, in Part IV, complex) function of configuration-space
      coordinates whose square modulus has direct physical meaning (charge
      density in Schrödinger's own reading; probability density in Born's
      reading published shortly after).
    type: "ontological_interpretation"
    relaxable: true
    relaxation_consequence: >-
      If ψψ̄ has neither interpretation, S3 is empty as a physical claim;
      the formalism survives but its physical content is unspecified.
    affects: [S3]
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part IV §7"
    body_sections: ["Part IV §7"]

  - id: S_AA3
    statement: >-
      The orthonormal proper-function system used to construct matrices in
      S_M5 may be chosen arbitrarily on q-space; different choices yield
      unitarily equivalent matrix realisations of the same dynamical
      function.
    type: "method_invariance"
    relaxable: true
    relaxation_consequence: >-
      Without basis-choice freedom, the operator-matrix correspondence is
      not a true representation result; S4's bidirectionality (matrices ↔
      functions) weakens.
    affects: [S_M5, S4]
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper §2 p.46 ('arbitrary orthogonal system')"
    body_sections: ["Equivalence paper §2"]

