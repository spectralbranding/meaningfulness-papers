title: >-
  Schrödinger 1926 Wave-Mechanics Series (Quantisation as a Problem of Proper
  Values, Parts I–IV) + the 1926 Equivalence Paper ("On the Relation between
  the Quantum Mechanics of Heisenberg, Born, and Jordan, and that of Schrödinger")

thesis_of_extracted_artifact: |
  Atomic-scale mechanics is governed by a wave equation (eigenvalue problem for a
  linear, self-adjoint differential operator on configuration space) whose proper
  values reproduce the empirically known atomic spectra (Balmer, Lyman, Paschen
  series; harmonic oscillator; rigid rotator; Stark effect; Sommerfeld fine
  structure). The proper-value spectrum of the wave equation is the energy-level
  structure of the atom; the proper functions encode its dynamical content. The
  resulting formalism is mathematically equivalent to the matrix mechanics of
  Heisenberg, Born, and Jordan: the two formulations differ in apparatus but
  agree on every empirical prediction and are mutually constructible.

