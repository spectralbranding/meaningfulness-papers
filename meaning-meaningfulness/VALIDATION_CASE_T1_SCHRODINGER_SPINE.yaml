negative_findings:
  - id: S_NF1
    statement: >-
      The two-electron helium atom is not solved exactly in this series;
      only approximate treatments are sketched. Bohr-Sommerfeld
      quantisation had failed for helium; wave mechanics inherits the
      problem (multi-electron correlation), demonstrating that the new
      formalism is not a universal solvent but a reformulation that
      preserves and exposes the same physical difficulties.
    expected_observation: "Exact closed-form helium ground-state energy."
    source_method: "Direct application of S_M3 to He-atom Hamiltonian."
