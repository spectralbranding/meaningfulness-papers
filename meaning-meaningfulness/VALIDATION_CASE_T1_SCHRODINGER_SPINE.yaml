# ============================================================================
# Mapping to parent paper (2026ao meaningfulness paper)
# ============================================================================
mapping_to_parent_paper:
  T1_role: |
    This spine extraction operationalises the Schrödinger side of the
    Heisenberg-Schrödinger twin-pair natural experiment used as Validation
    Case T1 of paper 2026ao. The Heisenberg side is extracted in a sibling
    YAML (forthcoming). The matched-pair structure permits direct isomorphism
    analysis: matrix-mechanics and wave-mechanics spines should map onto a
    common claim-graph (same observations S_O1-S_O5; same findings S_F1-S_F4
    up to formal restatement; same propositions modulo operator-vs-matrix
    rendering), differing only at the rendering-substrate (method) layer.
  P4_evidence: |
    S4 is the load-bearing proposition. It is the empirical-historical
    instance of P4 (rendering-equivalence under spine-preservation) in
    parent paper 2026ao. The case is strong because (a) the two formulations
    share no sentences — matrix algebra and continuous PDEs have no common
    surface vocabulary; (b) Schrödinger's footnote (p.46 fn.1) attests
    independent authorship from Heisenberg; (c) Schrödinger's own equivalence
    proof (§§2-4) constructs the bidirectional correspondence explicitly;
    (d) every empirical prediction (S_O1-S_O5) is shared. This is exactly
    the structural pattern P4 predicts and exactly what a sentence-by-
    sentence translation theory of cross-rendering invariance (rival A2 in
    2026ao SPINE.yaml) cannot explain — there are no shared sentences to
    translate.
  ruling_out_A2: |
    Alternative explanation A2 in the parent paper claims rendering-
    equivalence is reducible to translation-studies sentence-equivalence.
    The Schrödinger-Heisenberg twin pair existence-proves the rival false:
    no sentence-level map between matrix formulas and partial differential
    equations exists, yet the two formalisms preserve all empirical
    conclusions. The equivalence is at the operator/structural layer, not
    the sentence layer — exactly the P4 mechanism.
  caveats:
    - "Schema v0.2 represents Schrödinger's spine at a single time-slice (1926-1928 collected edition). Later modifications (Born interpretation, von Neumann formalisation, Dirac relativistic equation) sit OUTSIDE this spine and are flagged as open questions / external anchors."
    - "Single-coder extraction; AA2 (inter-coder κ ≥ 0.7) is not yet satisfied. Inter-coder validation pending Phase 2 of T1 case construction."

