propositions:
  - id: S1
    statement: >-
      Quantum behaviour at atomic scale is governed by a continuous wave
      equation on configuration space, with eigenvalue conditions that
      replace the ad-hoc integer-quantisation postulates of the old quantum
      theory; the discreteness of atomic spectra is a consequence of
      boundary-value-problem completeness, not an extra-mechanical axiom.
    type: "ontological"
    conditions: "C1, C2"
    antecedents: []
    assumptions: []
    falsifier: "Discovery of atomic-scale phenomena that cannot be cast as eigenvalue problems for any linear differential operator on configuration space."
    evidence:
      - type: empirical
        anchor: "Reproduction of Balmer, Lyman, Paschen, harmonic-oscillator, rigid-rotator, Stark-effect spectra (S_F1, S_F2, S_F4)."
        citation_keys: []
    ruled_out_rivals: [S_A1, S_A2]
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part I §1 + Abstract"
    body_sections: ["Part I §1; Abstract"]

  - id: S2
    statement: >-
      Energy levels of an atomic system are eigenvalues of a linear,
      self-adjoint differential operator (the wave-equation Hamiltonian)
      acting on a function space of admissible ψ; transition frequencies
      between observed spectral lines correspond to differences of these
      eigenvalues divided by h.
    type: "ontological"
    conditions: "C1, C2, C3"
    antecedents: [S1]
    assumptions: [S_AA1]
    falsifier: "Spectroscopic transitions inconsistent with any eigenvalue-difference / h structure (within C1+C2)."
    evidence:
      - type: empirical
        anchor: "S_F1 (hydrogen), S_m2 (oscillator), S_m4 (Lyman + Balmer intensities)."
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part I §2; Abstract"
    body_sections: ["Part I §2; Part II"]

  - id: S3
    statement: >-
      The wave function ψ admits a physical interpretation as a 'weight-
      function' on configuration space: ψψ̄ describes the density of electric
      charge (continuous-charge-density reading endorsed by Schrödinger);
      the system is to be conceived as a superposition of point-mechanical
      configurations each contributing with weight ψψ̄. (Note: this is
      Schrödinger's own preferred interpretation in Part IV §7; Born's
      probabilistic interpretation, published the same year, replaces this
      with a probability-density reading and ultimately prevailed. The
      claim S3 captures Schrödinger's 1926 commitment, not the consensus
      that followed.)
    type: "ontological"
    conditions: "C1, C2"
    antecedents: [S1, S2]
    assumptions: [S_AA2]
    falsifier: "Experimental demonstration that ψψ̄ behaves as a probability density (single-particle detection events) and not as a continuous charge density."
    evidence:
      - type: empirical
        anchor: "Schrödinger's worked-out continuity-of-electricity argument (Part IV §7, eqs. 37-42)."
    provenance:
      created_by: "ai:claude-opus-4-7+seed:N/A+prompt_anchor:VALIDATION_CASE_T1_SCHRODINGER_SPINE_extraction_prompt"
      created_at: "2026-05-26"
      source_log_event: "schrodinger_1928_collected_papers_wave_mechanics.pdf Part IV §7 pp.120-122"
    body_sections: ["Part IV §7"]
    historical_note: "Born 1926 Ztschr.f.Phys. 37 p.863 proposed |ψ|² as probability density shortly after; over 1926-1927 the Born interpretation became standard. Schrödinger's S3 here is the original wave-mechanics commitment, retained verbatim in the 1928 collected edition without retraction."

  - id: S4
    statement: >-
      Wave mechanics and the matrix mechanics of Heisenberg, Born, and
      Jordan are mathematically equivalent: every matrix-mechanical
      computation can be reduced to a wave-mechanical boundary-value
      problem (via the operator substitution pᵣ ↦ K∂/∂qᵣ and the orthonormal-
      proper-function construction of matrices), and conversely the wave-
      mechanical proper functions can be reconstructed from numerically
      given matrices. The two formulations differ in mathematical apparatus
      ('garb') but agree on every empirical prediction; from the formal
      mathematical standpoint they may be regarded as the same theory.
    type: "rendering_equivalence"
    conditions: "C1, C2, C3"
    antecedents: [S1, S2, S_O6]
    assumptions: [S_AA1, S_AA3]
    falsifier: >-
      Exhibition of an empirical prediction on which the two formulations
      disagree (within the shared boundary C1+C2+C3); or a proof that the
      operator-matrix correspondence S_M5 fails for some class of well-
      arranged dynamical functions.
    evidence:
      - type: analytic
        anchor: "Equivalence paper §§2-4: operator-matrix correspondence S_M5 + reduction of matrix equations of motion to wave-equation boundary-value problem (eqs. 18'-32)."
      - type: empirical
        anchor: "S_F3 + identical empirical predictions for hydrogen, oscillator, rotator, Stark effect; both formulations reproduce S_O1-S_O5."
      - type: log_anchor
        anchor: "schrodinger_1928_collected_papers_wave_mechanics.pdf equivalence paper p.46: 'one might well speak of the identity of the two theories'; p.57: 'they are completely equivalent from the mathematical point of view'; p.58: 'The equivalence actually exists, and it also exists conversely.'"
    citation_role_in_paper: "critical_evidence_for_P4"
    ruled_out_rivals: [S_A3]
    provenance:
