    statement: "AI is double-edged: it can serve as collaborator (streamlining research) OR adversary (impoverishing learning, fabricating evidence, biasing outputs). The valence is contingent on use, governance, and researcher skill."
    type: "ontological"
    conditions: "C1, C2"
    antecedents: [K1]
    falsifier: "If AI's net effect on research becomes reliably one-signed (uniformly beneficial OR uniformly harmful), K2's contingency claim fails."
    evidence:
      - type: empirical
        anchor: "Abstract states it as the paper's framing; intro frames as the focal tension; all essays return to some version of the dual-valence question."
    contributors_endorsing: ["all (framing-level), with degree-of-pessimism varying)"]
    body_sections: ["Abstract; intro p.2-3"]
    provenance:
      created_by: "kulkarni-2024-intro"
      created_at: "2024"
      source_log_event: "Abstract; intro"
  - id: K3
    statement: "AI shifts the COST/EFFORT/SKILL profile of specific research activities asymmetrically: literature review, data summarization, text formatting, and code-generation get cheaper; theorizing, judgment, reading-for-understanding, and embodied interpretation either stay the same or become RELATIVELY more costly."
    type: "ontological"
    conditions: "C1, C2"
    antecedents: [K1, K2]
    falsifier: "If empirical workflow studies show uniform cost-reduction across ALL research activities (including theorizing/judgment), K3's asymmetry claim fails."
    evidence:
      - type: empirical
        anchor: "Mantere & Vaara: 'AI will undoubtedly help' with literature review + writing, but raises authorship/novelty/genre questions; Lindebaum: reading-for-understanding (Adler & Van Doren) and writing-as-thinking cannot be outsourced; Cameron & Rahman: surprise as researcher-detected vs LLM-statistical-detected are fundamentally different operations; van den Broek: relational knowledge cannot be extracted by algorithm."
      - type: citation
        anchor: "Adler & Van Doren 1940/1972; Bender et al. 2021; Lebovitz et al. 2022; van den Broek et al. 2021"
        citation_role: theoretical_predecessor
    ruled_out_rivals: [A1]
    contributors_endorsing: ["Mantere & Vaara", "van den Broek", "Petriglieri", "Lindebaum", "Cameron & Rahman"]
    # >>> CRITICAL: this is the proposition closest to meaningfulness-paper P3 <<<
    overlap_with_meaningfulness_paper: |
      K3 is the strongest convergence with our P3 (cost-asymmetry across the
      three-level hierarchy). The Kulkarni discussion DOES NOT distinguish
      log/graph/render explicitly, but it independently identifies that AI's
      cost-reduction is uneven across research activities, with the
      "judgment / theorizing / embodied interpretation" activities staying
      expensive. This is the same shape as our P3 — meaningfulness operations
      (cohort-specific render) stay expensive while meaning operations
      (graph/structure-extraction) become cheap. Cameron & Rahman's
      "variance-seeking vs variance-reducing" distinction is structurally
      analogous to render-cohort-specific vs graph-aggregation.
    body_sections: ["Cross-essay synthesis: Mantere-Vaara p.7-8; van den Broek p.13-16; Lindebaum Provocation #1 p.37-38; Cameron-Rahman p.43-44"]
    provenance:
