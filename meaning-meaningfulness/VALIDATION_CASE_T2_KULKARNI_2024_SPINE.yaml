assumption_atoms:
  - id: AA1
    statement: "AI development continues at current or accelerating pace; LLMs become more capable and more pervasive in research practice."
    type: "trajectory_assumption"
    relaxable: true
    relaxation_consequence: "If AI development stalls or reverses, K1's strong universality claim weakens; specific provocations (K8) may not materialize."
    affects: [K1, K2, K11]
    provenance:
      created_by: "kulkarni-2024-intro"
      source_log_event: "Intro p.2 — 'AI systems are here to stay'"
  - id: AA2
    statement: "Management/organization scholarship is and should remain a HUMAN-CENTERED activity in which 'human centrality and agency in the research process' are values."
    type: "value_assumption"
    relaxable: true
    relaxation_consequence: "If MOS reframes around AI-centered or post-human research practices (Al-Amoudi 2023), the framing of all 7 essays as defending-human-centrality becomes one position among many."
    affects: [K2, K6, K9, K10, K11]
    provenance:
      created_by: "kulkarni-2024-intro"
      source_log_event: "Abstract; intro p.6"
  - id: AA3
    statement: "Theorizing is a distinct cognitive operation from text generation; LLM-generated text that resembles theory is not the same as theorizing."
    type: "ontological_assumption"
    relaxable: true
    relaxation_consequence: "If theorizing IS reducible to high-quality text generation, K8 and K9 collapse."
    affects: [K5, K8, K9]
    provenance:
      created_by: "extractor (synthesized across Mantere-Vaara, Lindebaum, Cameron-Rahman)"
      source_log_event: "extraction [session]"

