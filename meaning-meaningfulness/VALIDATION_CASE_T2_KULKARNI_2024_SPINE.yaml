title: "The Future of Research in an Artificial Intelligence-Driven World"

thesis: |
  Generative AI systems are now inescapably part of management and
  organization scholarship and will reshape every phase of the research
  process (authorship, theorizing, literature review, data collection,
  qualitative analysis, writing, peer review). Whether AI functions as
  collaborator or adversary is contingent and contested across the
  contributors; what is shared is the claim that human centrality, agency,
  judgment, and the moral-evaluative basis of scholarship are at stake. The
  field must develop new governance practices (citation, transparency,
  IRB-style heuristics) and new vocabularies (performativity, reassembly of
  agency, regime of knowing) to engage AI responsibly.

# ============================================================================
# Curated-discussion structural metadata
# ============================================================================
#
# The paper is a MULTI-AUTHOR CURATED DISCUSSION (7 essays + intro). It does
# NOT have a single integrated thesis — it has a framing introduction by
# Kulkarni and 6 contributor essays that diverge on key questions. The intro
# explicitly states: "Here is where we part company" (p. 6) — i.e., the
# editors flag dissensus rather than papering over it. This structural fact
# matters for spine extraction: the proposition set below is NOT collectively
# endorsed by all 13 authors. Per-proposition attribution is recorded in
# `contributors_endorsing:` to preserve dissensus.

curated_structure:
  - section: "Introduction"
    contributor: "Mukta Kulkarni (Indian Institute of Management Bangalore)"
    central_claim: "AI proliferation subverts contemporary beliefs about authorship, originality, and human centrality in research; the discussion that follows raises questions more than provides answers."
    pages: "2-6"
  - section: "How will AI change the narratives we write?"
    contributors: "Saku Mantere (McGill) & Eero Vaara (Oxford)"
    central_claim: "MOS theorizing is a narrative exercise; AI-as-artificial-narrator will reshape authorship, novelty, power/ideology, and genre — potentially enabling more diverse theoretical discourse if scholars exercise critical reflection."
    pages: "7-11"
  - section: "Towards Hybrid Forms of Research: How LLMs Reshape Knowledge Work"
    contributor: "Elmira van den Broek (Stockholm School of Economics)"
    central_claim: "Knowledge is relational, not just extractable; LLMs used unsupervised produce irrelevant or misguided outputs; the future is human-AI HYBRID work where expertise is required to assess and refine LLM outputs."
    pages: "12-16"
  - section: "LLMs and the production of knowledge about organizations and management: Taking a performative perspective"
    contributor: "Stella Pachidi (Cambridge)"
    central_claim: "LLMs are not neutral tools; they are co-constituted with social actors and exert performative effects on data collection, qualitative analysis, writing, and (most consequentially) the regime of knowing in academia."
    pages: "17-22"
  - section: "Chatty actors: Generative AI and the reassembly of agency in qualitative research"
    contributors: "Vern L. Glaser (Alberta) & Joel Gehman (George Washington)"
    central_claim: "Generative AI can be reassembled into three distinct agentic roles — research assistant, data analyst, co-author — each requiring its own governance principle (citation, transparency, IRB-equivalent oversight)."
    pages: "23-29"
    central_artifact: "Table 1 — Ways of Reassembling Agency in Qualitative Research"
  - section: "Large Language Models might displace inductive scholars — but they will not replace us"
    contributor: "Gianpiero Petriglieri (INSEAD)"
    central_claim: "Inductive scholarship requires compliance (with truth/data) and defiance (with theory); LLMs are compliant in the wrong ways (defy truth, please users), and adopting them risks dehumanizing academia by displacing identity-grounded creative impulses."
    pages: "30-34"
  - section: "Three provocations - ChatGPT undermines 'learning' to theorise, homogenizes theory, and distorts competition for the best ideas"
    contributor: "Dirk Lindebaum (Grenoble Ecole de Management)"
    central_claim: "ChatGPT (1) impoverishes the LEARNING-to-theorize process by discouraging reading-for-understanding and writing-as-thinking; (2) HOMOGENIZES theory via reckoning/formal rationality at the expense of judgment/substantive rationality; (3) DISTORTS competition for the best ideas given (in)transparent use in career-progression contexts."
    pages: "35-41"
    notable: "Three explicitly numbered provocations — the only contributor with an enumerated claim structure."
  - section: "Large Language Models in Qualitative Research: Not all that Glitters is Gold"
    contributors: "Lindsey D. Cameron (Wharton) & Hatim A. Rahman (Kellogg)"
    central_claim: "Qualitative research is variance-SEEKING; LLM 'surprise' (lowest-frequency token) is fundamentally unlike researcher 'surprise' (emergent moments of confirmation/disconfirmation); using LLMs in data analysis, literature review, or doctoral training risks unintended effects on what qualitative scholars value."
    pages: "42-47"
  - section: "Generative AI and Research Production: Moral Agency and Seductive Mediation"
    contributors: "Gazi Islam & Michelle Greenwood (Editors-in-Chief, Journal of Business Ethics)"
    central_claim: "Generative AI creates 'seductive mediation' — text whose human/non-human inputs are not clearly separable — that BLURS the sources of moral agency, making ethical evaluation of research practices increasingly intractable."
    pages: "48-52"

