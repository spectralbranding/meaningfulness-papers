# ============================================================================
# Alternative explanations the paper engages
# ============================================================================
alternative_explanations:
  - id: A1
    statement: "AI is a uniformly LIBERATING technology — replacing tedium and freeing creativity (Amabile 2019; Amabile 2020 'World of Surprises')."
    rules_out_required: [K3, K8]
    ruled_out_by: [K3]
    rules_out_status: "rejected (by Mantere-Vaara and Lindebaum)"
    reasoning: "Mantere & Vaara (p.8): historical record shows technology has LOCKED labor into 'a technological matrix' rather than liberating — average workday has not shortened despite 20th-century productivity gains (Frey 2019; Suzman 2020). Lindebaum: Amabile-style claims need 'a pinch of salt' because LLMs offer high-probability not low-probability choices, antithetical to creativity."
    provenance:
      created_by: "kulkarni-2024-mantere-vaara + kulkarni-2024-lindebaum"
      source_log_event: "Mantere-Vaara p.8; Lindebaum p.36"
    body_sections: ["Mantere-Vaara p.8; Lindebaum p.36"]
  - id: A2
    statement: "Knowledge IS extractable by algorithms from data (Domingos 2015 'AI systems eat up information, digest it, and turn it into knowledge')."
    rules_out_required: [K6]
    ruled_out_by: [F2, K6]
    rules_out_status: "rejected (by van den Broek)"
    reasoning: "Van den Broek's ATLAS.ti trial (O4, F2) demonstrates extractable-knowledge model fails empirically; practice-based studies show knowledge is relational and requires expert validation."
    provenance:
      created_by: "kulkarni-2024-vandenbroek"
      source_log_event: "van den Broek p.13"
  - id: A3
    statement: "Transparent disclosure of AI use (declaration statements) is sufficient governance — the human author remains in charge."
    rules_out_required: [K10, K12]
    ruled_out_by: [K10]
    rules_out_status: "rejected (by Lindebaum and by Islam & Greenwood)"
    reasoning: "Lindebaum: 'even if use of ChatGPT is transparently declared, it is difficult if not impossible to tease out the variance in the paper produced by a human or ChatGPT' (p.40). Islam & Greenwood: inputs CANNOT be clearly defined, not just are-not — seductive mediation is in-principle irremediable by labels."
    provenance:
      created_by: "kulkarni-2024-lindebaum + kulkarni-2024-islam-greenwood"
      source_log_event: "Lindebaum p.40; Islam-Greenwood p.50"
  - id: A4
    statement: "AI co-authorship is acceptable as long as AI 'made a substantial contribution' (ChatGPT's self-reported view to Kulkarni)."
    rules_out_required: [K10]
    ruled_out_by: []
    rules_out_status: "open (Kulkarni intro problematizes but does not resolve)"
    reasoning: "Kulkarni intro p.3: publishers and ethics officers say AI cannot be author because it cannot assume responsibility OR acquiesce to being an author (Stokel-Walker 2023). But Kulkarni asks: 'But what if the output of the AI is original, credible, and attributable?' — leaving open."
    provenance:
      created_by: "kulkarni-2024-intro"
      source_log_event: "Intro p.3"

# ============================================================================
# Robustness checks the paper engages
# ============================================================================
robustness_checks:
  - id: RC1
    statement: "Lindebaum's self-experiment: identical writing instructions given to himself and to ChatGPT; complementary text made available on request for direct comparison."
    varied_parameter: "agent (human-Lindebaum vs ChatGPT)"
    range_explored: "single comparison, single prompt"
    result_stability: "confirmed (per Lindebaum's framing; not publicly published as a side-by-side comparison in the paper)"
    affects_nodes: [K8, F1]
    source_method: M2
    provenance:
      created_by: "kulkarni-2024-lindebaum"
      source_log_event: "Acknowledgments p.53"
    note: |
      This is the methodologically most ambitious move in the paper and is
      structurally identical to what the meaningfulness paper would call a
      RENDERING-EQUIVALENCE check under spine-fixed inputs. Lindebaum's
      reading: humans and AI produce DIFFERENT outputs on identical input,
      and the human output is preferable. Spine-extraction-perspective
      reading: this is a P4 (rendering-equivalence-under-spine-fixedness)
      check inverted — if the spine is fixed (the writing prompt), the two
      renderings should be informationally equivalent under P4; Lindebaum's
      observation that they are NOT equivalent could either falsify P4 OR
      indicate that the prompt does not fix the spine.

