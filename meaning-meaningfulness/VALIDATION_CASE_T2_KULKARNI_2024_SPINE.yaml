# ============================================================================
# Dependency-DAG vs Citation-DAG comparison (H_T2_3 hypothesis)
# ============================================================================
dependency_dag_comparison:
  proposition_dag_summary: |
    The retroactive proposition DAG looks like:
      K1 (universal AI-reshapes-research)
        └─ K2 (double-edged) [Kulkarni framing]
            └─ K3 (cost-asymmetry) ★★★ CORE OVERLAP WITH MEANINGFULNESS-P3
                ├─ K8 (LLMs impoverish theorizing) [Lindebaum]
                └─ K11 (hybrid forms) [van den Broek + Glaser-Gehman]
                    └─ K12 (governance: cite/transparency/IRB) [Glaser-Gehman]
            └─ K5 (authorship 4-fold threat) [Mantere-Vaara]
        └─ K6 (knowledge is relational) [van den Broek]
            └─ K7 (LLMs are performative) [Pachidi]
                └─ K10 (seductive mediation) [Islam-Greenwood]
            └─ K9 (qualitative-surprise distinctive) [Cameron-Rahman]
        └─ K4 (3 agentic modes) [Glaser-Gehman empirical observation]
            └─ K12 (governance taxonomy)
  citation_dag_observation: |
    The citation graph reveals BRANCH-CLUSTERED dependency: each contributor
    leans heavily on their own prior work + a small canonical anchor set,
    with cross-essay citation surprisingly sparse:
      - Mantere & Vaara cite Ketokivi-Mantere-Cornelissen 2017, Leone-Mantere-Faraj 2021, Vaara-Sonenshein-Boje 2016 (own/co-authored) + Foucault, Barthes, McLuhan, Park-Leahey-Funk
      - van den Broek cites van den Broek-Sergeeva-Huysman 2021, Pakarinen-Huising 2023, Lebovitz 2022, Anthony 2018, Cook-Brown 1999, Orlikowski 2002, Domingos 2015 (ruled out)
      - Pachidi cites Pachidi-Berends-Faraj-Huysman 2021, Glaser-Pollock-D'Adderio 2021, Orlikowski-Scott 2008/2014, Cabantous-Gond 2011, Gond et al. 2016, Espeland-Sauder 2007, Austin 1975, Barad 2003
      - Glaser & Gehman cite Latour 2005 (epigraph), Glaser-Gehman-Sloan 2023, Gehman-Sharma-Beveridge 2022, Glaser-Fiss-Kennedy 2016, Strauss-Corbin 1998, Glaser-Strauss 1967, Merton 1973, Ziman 2001, Anderson-Tushman 1990
      - Petriglieri cites Petriglieri 2020, Petriglieri-Ashford 2023, Petriglieri-Petriglieri 2015/2022, Petriglieri-Wood-Petriglieri 2011, Chamorro-Premuzic 2023, Pakarinen-Huising 2023
      - Lindebaum cites Lindebaum-Fleming 2023, Lindebaum-Vesa-Den Hond 2020, Lindebaum-Moser-Ashraf-Glaser 2023, Lindebaum-Ramirez 2023, Smith 2019, Moser-den Hond-Lindebaum 2022, Bender 2021, Adler-Van Doren 1972, Eloundou 2023, Gabriel 2016
      - Cameron & Rahman cite Cameron 2022, Rahman 2019/2023, Christianson 2011, Charmaz 2006, Locke et al. 2015/2022, Grodal 2021, Bender 2021, Eisenhardt 1989, Spradley 1979/1980
      - Islam & Greenwood cite Greenwood-Wolfram Cox 2022, Verbeek 2011, Watson-Freeman-Parmar 2008, Bouchard 2016, Hosseini 2023, Balmer 2023, Pierre-Adams 2015
  agreement_with_proposition_dag: |
    The proposition DAG and citation DAG AGREE on:
      - K3 is the highest-degree node by both measures (most antecedents +
        most-shared citations across contributors)
      - K6 (relational knowledge) anchors a tightly-cited cluster
        (van den Broek's MIS Quarterly paper + Pakarinen-Huising + Anthony +
        Lebovitz) that maps cleanly to the proposition DAG.
      - K10 (seductive mediation) is a CLEAR single-source dependency on
        Greenwood-Wolfram-Cox 2022 — citation graph confirms the single-edge
        derivation D3.
    The proposition DAG and citation DAG DISAGREE on:
      - The proposition DAG suggests K8 (impoverishment) has K3 as antecedent,
        but Lindebaum's CITATION pattern does NOT cite van den Broek's or
        Cameron-Rahman's work that proposes K3. The cost-asymmetry is
        independently re-derived rather than building on co-essayists.
        => Suggests the curated-discussion genre's BRANCH-CLUSTERED citation
        pattern leaves real propositions SEMANTICALLY connected but
        bibliographically disconnected.
      - K1 has very wide citation breadth but very thin SHARED citation —
        each contributor cites their own-cluster work to support the same
        meta-claim. This is consistent with the curated-discussion genre:
        consensus on the foundational claim is rhetorical, not citation-mediated.
  implication_for_meaningfulness_paper: |
    The retroactive-spine vs citation-graph comparison illustrates a key
    feature of the curated-discussion genre that the meaningfulness paper
    can FORK from: multi-author papers tend to have HIGH spine-level
    convergence but LOW citation-level convergence. The spine-first
    drafting protocol would (a) make spine-convergence visible without
    requiring citation-convergence, and (b) flag the structural gap as
    a feature, not a bug, of curated discussions.

# ============================================================================
# Validation case findings (for the meaningfulness paper)
# ============================================================================
validation_payoff:
  primary_overlap: |
    Kulkarni et al. 2024 INDEPENDENTLY articulate the cost-asymmetry result
    (our P3) without using the log/graph/render hierarchy or the meaning/
    meaningfulness vocabulary. Specifically:
      - Mantere & Vaara: literature review + writing get cheaper; theorizing
        + judgment do not (p.7-8)
      - Lindebaum Provocation #1: reading-for-understanding and writing-
        as-thinking cannot be outsourced; ChatGPT discourages both (p.37-38)
      - Cameron & Rahman: 'surprise' as LLM-low-frequency-token vs
        researcher-emergent-confirmation/disconfirmation are structurally
        different operations (p.43)
      - van den Broek: AI handles pattern extraction; relational interpretation
        remains expert work (p.13-16)
    This is a STRONG natural-experiment confirmation for P3: a 13-author
    curated discussion at a JMI venue, published in early 2024 without
    knowledge of the meaningfulness-paper framework, independently produces
    the cost-asymmetry shape. The vocabularies differ (formal-rationality
    vs substantive-rationality; variance-reducing vs variance-seeking;
    extractable vs relational knowledge) but the structural claim is the
    same: AI cost-reduction is uneven, with the "meaningfulness layer"
    (judgment, embodied interpretation, theoretical commitment, cohort-
    specific rendering) staying expensive.
  secondary_overlaps:
    - "K6 (knowledge-is-relational) maps to our boundary condition C3 (audience-schema-divergence-is-nontrivial)"
    - "K7 (LLMs are performative) maps to our claim about how artifact-form shapes meaning-extraction"
    - "K10 (seductive mediation) is structurally analogous to our concern about render-drift unanchored from spine"
    - "K11 (hybrid forms) + K12 (governance taxonomy) maps to our division-of-labor section (Section 8 — Discussion)"
  divergences:
    - "Kulkarni paper does NOT distinguish log/graph/render (no three-level hierarchy)"
    - "Kulkarni paper does NOT propose a formal protocol (no spine-first equivalent)"
    - "Kulkarni paper does NOT operationalize the cost-asymmetry into a measurable framework"
    - "Kulkarni paper LACKS the prescriptive intervention layer — it stops at problem articulation"
    - "Petriglieri's REJECTION of hybrid work (K11 dissent) is a stance the meaningfulness paper does not engage — possible FORK point for our Section 8"
  spine_first_self_application_observation: |
    The Kulkarni paper is itself a textbook case of why spine-first drafting
    would help. Its 7 essays SHARE substantial proposition-level overlap
    (K1, K2, K3 endorsed by all) but the prose lacks a unified spine —
    forcing the editor (Kulkarni) to do the integrative work in a 5-page
    intro that explicitly flags dissensus. A SPINE.yaml of this curated
    discussion (constructed pre-prose) would have surfaced the K1/K2/K3
    consensus as the shared substrate AND made dissensus on K8/K11
    visible as explicit FORK operations rather than as prose-level
    "here is where we part company."
  implications_for_T2_validation:
    "T2 PASSES with strong overlap: a contemporary, theoretically adjacent,
     tier-2-venue multi-author paper independently produces the cost-
     asymmetry shape (K3 ≈ P3), supports the cost-asymmetry-implies-
     intervention reasoning (Glaser-Gehman governance taxonomy K12), and
     exhibits the consequences of spine-LESS drafting (the curated-
     discussion genre's branch-clustered citation pattern + editor-as-
     spine-substitute introduction). This is the strongest possible
     contemporary-venue-fit anchor for the meaningfulness paper."

