    dimension (language, audience register, structural ordering, tone, formatting, length, medium) and
    still converge on conclusions. When two renderings DISAGREE on any locked proposition, boundary condition,
    stylized fact, antecedent DAG edge, recommended intervention, or scope claim, at least one has broken
    the spine.
