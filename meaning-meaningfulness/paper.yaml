acceptance:
- claim_id: P1
  criterion: 'Holds if meaning and meaningfulness are separately optimizable: σ takes L → S without consulting
    any R; ρ takes (S, cohort, language, medium) → R without altering S.'
  falsification: If σ requires inspecting any R(S, c, ℓ, m) to produce S, the middle layer is a projection
    from rendering rather than from log, and the hierarchy collapses to two-level.
- claim_id: P2
  criterion: Holds if organizations (research labs, consulting firms, standards bodies) that publish the
    semantic substrate (S) of their knowledge artifacts as a first-class artifact achieve higher rates
    of knowledge recombination than organizations that publish only the rendering (R), under boundary
    conditions C1–C4.
  falsification: Under C1–C4, an organization that publishes only R achieves recombination rates indistinguishable
    from a matched organization that publishes S over a 24–36 month observation window. Empirical test
    in Paper B v2.0.0+ once prospective lab-cohort data is available; v1.0.0 illustration only.
- claim_id: P3
  criterion: Holds if under conditions C1–C4, generative-AI verification cost on S scales sub-linearly
    with claim volume while verification cost on R scales super-linearly.
  falsification: Under C1–C4, AI verification cost on R scales at or below the rate on S (empirically
    β ≥ δ) — which would invert the cost-allocation prescription. Paper B v1.0.0 supplies illustrative
    β/δ point estimates from N=2 twin-pair extractions; v2.0.0+ supplies confidence intervals; v4.0.0
    supplies SMJ-scale falsification test.
- claim_id: P4
  criterion: Holds if for any artifact whose SPINE.
  falsification: Two faithful renderings of the same locked spine arrive at DIFFERENT conclusions on a
    load-bearing proposition without either one having broken the spine. (If found, the renderings would
    need a hidden spine-layer difference, which contradicts the spine-lock hypothesis.)
